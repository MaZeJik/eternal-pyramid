<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE ABSOLUTE ZERO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; cursor: none; }
        
        #ui-master {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center; padding: 12vh;
            z-index: 1000; pointer-events: none;
        }

        #zenith-count {
            font-family: 'Cinzel', serif; font-size: 14vw; color: #fff;
            filter: drop-shadow(0 0 150px rgba(212,175,55,0.8));
            background: linear-gradient(180deg, #fff 10%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -18px; line-height: 0.5; margin: 0;
        }

        .void-label {
            color: #d4af37; letter-spacing: 60px; font-size: 0.4rem;
            text-transform: uppercase; opacity: 0.15; font-family: 'Cinzel';
        }
    </style>
</head>
<body>

<div id="ui-master">
    <div style="text-align:center">
        <h1 id="zenith-count">8,000,000,000</h1>
        <div class="void-label">THE COLLECTIVE CORE</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(4, window.innerWidth / window.innerHeight, 1, 10000);
    camera.position.z = 600;

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(1); // Keskin ve ham pikseller
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 4.0;
    document.body.appendChild(renderer.domElement);

    const monolith = new THREE.Group();
    scene.add(monolith);

    // --- DARK MATTER GEOMETRY ---
    const geo = new THREE.ConeGeometry(20, 32, 4, 1, true);
    const mat = new THREE.MeshStandardMaterial({ 
        color: 0x000000, roughness: 1, metalness: 0,
        emissive: 0xd4af37, emissiveIntensity: 0.01
    });
    const core = new THREE.Mesh(geo, mat);
    monolith.add(core);

    // Kinetik Enerji Kabuğu (Parıldayan Kenarlar)
    const shellGeo = new THREE.ConeGeometry(20.2, 32.2, 4, 1, true);
    const shellMat = new THREE.MeshBasicMaterial({ color: 0xd4af37, wireframe: true, transparent: true, opacity: 0.05 });
    monolith.add(new THREE.Mesh(shellGeo, shellMat));

    // --- FRAGMENTED SOULS (Işık Fosil Sistemi) ---
    const stars = [];
    for(let i=0; i<400; i++) {
        const side = i % 4;
        const row = Math.floor(i / 40);
        const angle = side * (Math.PI / 2);
        const radius = 19 - (row * 1.2);
        
        const faceTex = new THREE.TextureLoader().load(`https://i.pravatar.cc/100?u=${i + 2026}`);
        const faceMat = new THREE.MeshBasicMaterial({ 
            map: faceTex, transparent: true, opacity: 0, color: 0xd4af37, blending: THREE.AdditiveBlending 
        });
        const p = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), faceMat);
        p.position.set(Math.cos(angle)*radius, (row * 2.5) - 15, Math.sin(angle)*radius);
        p.rotation.y = angle;
        monolith.add(p);
        stars.push({ m: p, freq: Math.random() * 0.05 });
    }

    // --- GRAVITY ENGINE ---
    let tX = 0, tY = 0, cX = 0, cY = 0;
    window.addEventListener('mousemove', (e) => {
        tX = (e.clientX - window.innerWidth/2) * 0.00005;
        tY = (e.clientY - window.innerHeight/2) * 0.00005;
    });

    function draw() {
        requestAnimationFrame(draw);
        
        // Atalet: Dev bir kütlenin yavaşlığı
        cX += (tX - cX) * 0.005;
        cY += (tY - cY) * 0.005;
        
        monolith.rotation.y += 0.0008 + cX;
        monolith.rotation.x += cY;

        // Subliminal Parlamalar
        stars.forEach(s => {
            const pulse = Math.pow(Math.sin(Date.now() * s.freq), 20);
            s.m.material.opacity = pulse * 0.7;
            s.m.scale.setScalar(1 + pulse * 0.5);
        });

        // Kütle Titreşimi
        if(Math.random() > 0.98) {
            monolith.position.x = (Math.random() - 0.5) * 0.2;
        } else {
            monolith.position.x *= 0.9;
        }

        renderer.render(scene, camera);
    }
    draw();
</script>
</body>
</html>
