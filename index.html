<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>NEXUS PRIME | THE ASCENSION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@100&display=swap');
        body { margin: 0; background: #000; overflow: hidden; }
        #ui {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10; pointer-events: none;
        }
        #counter {
            font-family: 'Cinzel', serif; font-size: 7vw; color: #fff;
            background: linear-gradient(to bottom, #fff, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 50px rgba(212,175,55,0.4));
            margin-bottom: 20px;
        }
        .btn-prime {
            pointer-events: auto; background: none; border: 1px solid #d4af37;
            color: #d4af37; padding: 20px 80px; font-family: 'Cinzel';
            letter-spacing: 15px; cursor: pointer; transition: 1s cubic-bezier(0.1, 1, 0.1, 1);
        }
        .btn-prime:hover { background: #d4af37; color: #000; box-shadow: 0 0 150px #d4af37; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="ui">
    <h1 id="counter">8,000,000,000</h1>
    <button class="btn-prime" onclick="location.reload()">REGENERATE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script id="vertexShader" type="x-shader/x-vertex">
    varying vec2 vUv;
    varying vec3 vPosition;
    void main() {
        vUv = uv;
        vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
    varying vec2 vUv;
    varying vec3 vPosition;
    uniform float uTime;
    
    void main() {
        // Altın ve taş karışımı pürüzlü doku hesaplaması
        float noise = fract(sin(dot(vUv ,vec2(12.9898,78.233))) * 43758.5453);
        vec3 stoneColor = vec3(0.1, 0.08, 0.05);
        vec3 goldColor = vec3(0.83, 0.68, 0.21);
        
        // Piramidin kenarlarında parlayan altın damarlar
        float glow = smoothstep(0.4, 0.5, sin(vPosition.y * 10.0 + uTime));
        vec3 finalColor = mix(stoneColor, goldColor, glow * 0.3 + noise * 0.1);
        
        gl_FragColor = vec4(finalColor, 1.0);
    }
</script>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 4, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- ÖZEL SHADER PİRAMİT ---
    const geometry = new THREE.ConeGeometry(8, 12, 4);
    const material = new THREE.ShaderMaterial({
        vertexShader: document.getElementById('vertexShader').textContent,
        fragmentShader: document.getElementById('fragmentShader').textContent,
        uniforms: { uTime: { value: 0.0 } }
    });
    const pyramid = new THREE.Mesh(geometry, material);
    scene.add(pyramid);

    // --- YÜZLER SÜRÜSÜ (BİNLERCE NOKTA) ---
    const pointsGeo = new THREE.BufferGeometry();
    const count = 15000;
    const pos = new Float32Array(count * 3);
    for(let i=0; i<count*3; i++) pos[i] = (Math.random()-0.5)*150;
    pointsGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const pointsMat = new THREE.PointsMaterial({ size: 0.04, color: 0xd4af37, transparent: true, opacity: 0.5 });
    const points = new THREE.Points(pointsGeo, pointsMat);
    scene.add(points);

    // --- ALTIN SORU İŞARETİ (ZİRVE) ---
    const qLabel = createQ();
    qLabel.position.y = 7;
    scene.add(qLabel);

    function createQ() {
        const c = document.createElement('canvas'); c.width=512; c.height=512;
        const x = c.getContext('2d');
        x.font = "bold 400px 'Cinzel'"; x.fillStyle="#fff"; x.textAlign="center"; x.textBaseline="middle";
        x.shadowColor="#d4af37"; x.shadowBlur=60; x.fillText("?", 256, 256);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c) }));
        sprite.scale.set(5, 5, 1);
        return sprite;
    }

    // ANİMASYON
    let time = 0;
    function animate() {
        requestAnimationFrame(animate);
        time += 0.02;
        material.uniforms.uTime.value = time;
        
        pyramid.rotation.y += 0.005;
        points.rotation.y += 0.0002;
        qLabel.position.y = 7 + Math.sin(time)*0.2;
        
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
