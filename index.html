<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE ABSOLUTE MONOLITH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Montserrat:wght@100;400&display=swap');
        
        body { margin: 0; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); overflow: hidden; }
        
        #ui-overlay {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 5vh 0; z-index: 1000; pointer-events: none;
        }

        #counter {
            font-family: 'Cinzel', serif; font-size: clamp(3rem, 12vw, 9rem);
            color: #fff; margin: 0; letter-spacing: -5px; line-height: 1;
            background: linear-gradient(180deg, #ffffff 40%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(212,175,55,0.25));
        }

        .label { color: #d4af37; letter-spacing: 20px; font-size: 0.7rem; text-transform: uppercase; margin-top: 10px; opacity: 0.6; font-family: 'Montserrat'; }

        .btn-join {
            pointer-events: auto; background: none; border: 1px solid rgba(212,175,55,0.4);
            color: #d4af37; padding: 20px 80px; font-family: 'Cinzel';
            font-size: 1.1rem; letter-spacing: 8px; cursor: pointer;
            transition: 0.6s all cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(10px);
        }
        .btn-join:hover { background: #d4af37; color: #000; box-shadow: 0 0 100px #d4af37; letter-spacing: 12px; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div style="text-align:center">
        <h1 id="counter">8,000,000,000</h1>
        <div class="label">Living Relics Collected</div>
    </div>
    <button class="btn-join">SECURE YOUR PLACE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(24, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 32);

    const renderer = new THREE.WebGLRenderer({ antialias: true, stencil: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // --- GRUP VE ANA PİRAMİT ---
    const worldGroup = new THREE.Group();
    scene.add(worldGroup);

    // Devasa Siyah Mermer Gövde
    const pyramidGeo = new THREE.ConeGeometry(8, 11, 4);
    const pyramidMat = new THREE.MeshStandardMaterial({ 
        color: 0x050505, metalness: 0.9, roughness: 0.1, flatShading: false
    });
    const monolith = new THREE.Mesh(pyramidGeo, pyramidMat);
    worldGroup.add(monolith);

    // Altın Soru İşareti (Zirvedeki Sır)
    const qSprite = createQ();
    qSprite.position.set(0, 6.8, 0);
    worldGroup.add(qSprite);

    function createQ() {
        const can = document.createElement('canvas'); can.width=1024; can.height=1024;
        const x = can.getContext('2d');
        x.font = "900 600px 'Cinzel'"; x.fillStyle="#fff"; x.textAlign="center"; x.textBaseline="middle";
        x.shadowColor="#d4af37"; x.shadowBlur=100; x.fillText("?", 512, 512);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
            map: new THREE.CanvasTexture(can), transparent: true, blending: THREE.AdditiveBlending 
        }));
        sprite.scale.set(6, 6, 1);
        return sprite;
    }

    // --- YÜZLER MOZAİĞİ (Gömülü Panel Sistemi) ---
    const faceGroup = new THREE.Group();
    worldGroup.add(faceGroup);
    const faces = [];

    for(let i=0; i<100; i++) {
        const side = i % 4;
        const row = Math.floor(i / 10);
        const angle = side * (Math.PI / 2);
        const radius = 6.5 - (row * 0.45);
        
        const loader = new THREE.TextureLoader();
        const tex = loader.load(`https://i.pravatar.cc/100?u=${i + Math.random()}`);
        const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending });
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.7), mat);

        plane.position.set(Math.cos(angle)*radius, (row * 0.95) - 5, Math.sin(angle)*radius);
        plane.rotation.y = angle;
        faceGroup.add(plane);
        faces.push({ mesh: plane, phase: Math.random() * Math.PI * 2 });
    }

    // --- IŞIKLANDIRMA (Lüks Katmanı) ---
    const sun = new THREE.DirectionalLight(0xffffff, 2);
    sun.position.set(5, 10, 7);
    scene.add(sun);

    const goldPoint = new THREE.PointLight(0xd4af37, 5, 40);
    goldPoint.position.set(-5, 5, 5);
    scene.add(goldPoint);

    const amb = new THREE.AmbientLight(0x111111);
    scene.add(amb);

    // --- ANİMASYON VE ETKİLEŞİM ---
    let mX = 0, mY = 0;
    window.addEventListener('mousemove', (e) => {
        mX = (e.clientX - window.innerWidth/2) * 0.0004;
        mY = (e.clientY - window.innerHeight/2) * 0.0004;
    });

    let countVal = 8000000000;
    function animate() {
        requestAnimationFrame(animate);
        
        worldGroup.rotation.y += 0.002 + mX;
        worldGroup.rotation.x += (mY - worldGroup.rotation.x) * 0.05;

        // Yüzlerin "Matrix" vari yanıp sönmesi
        faces.forEach(f => {
            f.mesh.material.opacity = 0.2 + Math.abs(Math.sin(Date.now() * 0.001 + f.phase)) * 0.3;
        });

        qSprite.position.y = 6.8 + Math.sin(Date.now()*0.0015)*0.25;

        if(Math.random() > 0.98) {
            countVal += 1;
            document.getElementById('counter').innerText = countVal.toLocaleString('en-US');
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
