<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE ETERNAL NEXUS | GRANITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@100;400&display=swap');
        body { margin: 0; background: #050505; overflow: hidden; cursor: crosshair; }
        
        #ui {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 40px; z-index: 100; pointer-events: none;
        }

        #number {
            font-family: 'Cinzel', serif; font-size: 8vw; color: #fff; margin: 0;
            background: linear-gradient(180deg, #fff 20%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(212,175,55,0.3));
        }

        .label { color: #d4af37; letter-spacing: 20px; font-size: 0.8rem; margin-top: 10px; opacity: 0.6; }
    </style>
</head>
<body>

<div id="ui">
    <div style="text-align:center">
        <h1 id="number">8,000,000,000</h1>
        <div class="label">Living Monument Core</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 30);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    // Gerçekçilik için ToneMapping şart
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.toneMappingExposure = 1.5;
    document.body.appendChild(renderer.domElement);

    // --- DOKU OLUŞTURMA (Procedural Texture) ---
    // Kumtaşı dokusunu canvas ile simüle edip map olarak kullanıyoruz
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#1a140f'; // Koyu taş rengi
    ctx.fillRect(0,0,512,512);
    for(let i=0; i<20000; i++) { // Kum tanecikleri
        ctx.fillStyle = Math.random() > 0.5 ? '#2a201a' : '#000';
        ctx.fillRect(Math.random()*512, Math.random()*512, 1.5, 1.5);
    }
    const stoneTex = new THREE.CanvasTexture(canvas);
    stoneTex.wrapS = stoneTex.wrapT = THREE.RepeatWrapping;
    stoneTex.repeat.set(2, 2);

    // --- MONOLİT (AĞIR VE PÜRÜZLÜ) ---
    const pyramidGroup = new THREE.Group();
    scene.add(pyramidGroup);

    const pyramidMat = new THREE.MeshStandardMaterial({ 
        map: stoneTex,
        bumpMap: stoneTex, // Dokunun çıkıntılı görünmesini sağlar
        bumpScale: 0.15,
        color: 0x3d2b1f,
        metalness: 0.1,
        roughness: 0.8
    });
    const monolith = new THREE.Mesh(new THREE.ConeGeometry(8, 12, 4), pyramidMat);
    pyramidGroup.add(monolith);

    // Altın Soru İşareti
    const qLabel = createQ();
    qLabel.position.y = 7;
    pyramidGroup.add(qLabel);

    function createQ() {
        const c = document.createElement('canvas'); c.width=512; c.height=512;
        const x = c.getContext('2d');
        x.font = "bold 400px 'Cinzel'"; x.fillStyle="#fff"; x.textAlign="center"; x.textBaseline="middle";
        x.shadowColor="#d4af37"; x.shadowBlur=80; x.fillText("?", 256, 256);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c) }));
        sprite.scale.set(5, 5, 1);
        return sprite;
    }

    // --- IŞIK (Dokuyu Göstermek İçin Şart) ---
    const sun = new THREE.DirectionalLight(0xd4af37, 2.5);
    sun.position.set(10, 10, 10);
    scene.add(sun);
    
    const sideLight = new THREE.PointLight(0xffffff, 1, 50);
    sideLight.position.set(-10, -5, 5);
    scene.add(sideLight);

    // --- ETKİLEŞİM ---
    let targetRotationX = 0;
    let targetRotationY = 0;
    let mouseX = 0;
    let mouseY = 0;

    window.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX - window.innerWidth / 2) * 0.0005;
        mouseY = (e.clientY - window.innerHeight / 2) * 0.0005;
    });

    function animate() {
        requestAnimationFrame(animate);
        
        // Yavaş, vakur dönüş
        pyramidGroup.rotation.y += 0.0015; 
        
        // Mouse ile müdahale (Yumuşak takip - Lerp)
        pyramidGroup.rotation.y += (mouseX - targetRotationY) * 0.1;
        pyramidGroup.rotation.x += (mouseY - targetRotationX) * 0.1;

        qLabel.position.y = 7 + Math.sin(Date.now()*0.001)*0.2;

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
