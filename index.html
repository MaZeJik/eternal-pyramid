<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE ZENITH | MASTERPIECE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; cursor: none; }
        
        #overlay {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 6vh; z-index: 1000; pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 100%);
        }

        #zenith-number {
            font-family: 'Cinzel', serif; font-size: clamp(4rem, 14vw, 11rem);
            color: #fff; margin: 0; letter-spacing: -12px; line-height: 0.8;
            filter: drop-shadow(0 0 100px rgba(212,175,55,0.8));
            background: linear-gradient(180deg, #fff 20%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .master-label { 
            color: #d4af37; letter-spacing: 35px; font-size: 0.6rem; 
            text-transform: uppercase; margin-top: 30px; opacity: 0.3;
            font-family: 'Cinzel'; text-indent: 35px;
        }

        /* Başyapıtın o kirli, ham dokusunu simüle eden Noise katmanı */
        #noise {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: .05; z-index: 500; pointer-events: none;
            background: url('https://media.giphy.com/media/oEI9uWUic9Zsc/giphy.gif');
        }
    </style>
</head>
<body>

<div id="noise"></div>
<div id="overlay">
    <div style="text-align: center;">
        <h1 id="zenith-number">8,000,000,000</h1>
        <div class="master-label">The Living Apex</div>
    </div>
    <div style="color:rgba(212,175,55,0.1); font-family:Cinzel; letter-spacing:25px; font-size:0.5rem;">BEYOND ALL LIMITS</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    // Perspektifi iyice daraltıp objeyi devleştiriyoruz
    const camera = new THREE.PerspectiveCamera(12, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 0, 90);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 2.5;
    document.body.appendChild(renderer.domElement);

    const coreGroup = new THREE.Group();
    scene.add(coreGroup);

    // --- MONOLITH: FRACTURED SECTIONS ---
    const matStone = new THREE.MeshStandardMaterial({ color: 0x010101, roughness: 1, metalness: 0 });
    const matGold = new THREE.MeshStandardMaterial({ color: 0xd4af37, emissive: 0xd4af37, emissiveIntensity: 2 });

    const parts = [];
    for(let i=0; i<5; i++) {
        const h = 3;
        const geo = new THREE.CylinderGeometry(i*1.5, (i+1)*2.5, h, 4, 1);
        const mesh = new THREE.Mesh(geo, matStone);
        mesh.position.y = (2-i) * (h + 0.2);
        mesh.rotation.y = Math.PI / 4;
        
        // İçten sızan altın enerji katmanı
        const innerGeo = new THREE.CylinderGeometry(i*1.5-0.1, (i+1)*2.5-0.1, h-0.1, 4, 1);
        const inner = new THREE.Mesh(innerGeo, matGold);
        mesh.add(inner);
        
        coreGroup.add(mesh);
        parts.push({m: mesh, offset: i * 0.4});
    }

    // --- THE SOUL CLOUD (8 Milyar Veri Noktası) ---
    const cloudGeo = new THREE.BufferGeometry();
    const count = 50000;
    const pos = new Float32Array(count * 3);
    for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 200;
    cloudGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const cloudMat = new THREE.PointsMaterial({ size: 0.02, color: 0xd4af37, transparent: true, blending: THREE.AdditiveBlending });
    const cloud = new THREE.Points(cloudGeo, cloudMat);
    scene.add(cloud);

    // --- IŞIKLANDIRMA (The Fracture Source) ---
    const light = new THREE.PointLight(0xd4af37, 20, 150);
    light.position.set(0, 0, 20);
    scene.add(light);

    // --- ETKİLEŞİM (Ağır İvme ve Titreşim) ---
    let targetX = 0, targetY = 0;
    let curX = 0, curY = 0;
    window.addEventListener('mousemove', (e) => {
        targetX = (e.clientX - window.innerWidth/2) * 0.0004;
        targetY = (e.clientY - window.innerHeight/2) * 0.0004;
    });

    function animate() {
        requestAnimationFrame(animate);
        
        curX += (targetX - curX) * 0.01;
        curY += (targetY - curY) * 0.01;
        
        coreGroup.rotation.y += 0.001 + curX;
        coreGroup.rotation.x += (curY - coreGroup.rotation.x) * 0.02;

        const time = Date.now() * 0.001;
        
        // Parçaların manyetik salınımı
        parts.forEach(p => {
            p.m.position.y += Math.sin(time + p.offset) * 0.005;
            p.m.rotation.y += Math.cos(time + p.offset) * 0.002;
        });

        cloud.rotation.y += 0.0002;
