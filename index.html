<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE ETERNAL NEXUS | ZENITH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        body { margin: 0; background: #050505; overflow: hidden; cursor: crosshair; }
        #ui {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 40px; z-index: 100; pointer-events: none;
        }
        #counter {
            font-family: 'Cinzel', serif; font-size: 7vw; color: #fff;
            background: linear-gradient(180deg, #fff, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 50px rgba(212,175,55,0.3));
        }
        .footer-text { font-family: 'Cinzel'; color: #d4af37; letter-spacing: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="ui">
    <div style="text-align:center">
        <h1 id="counter">8,000,000,000</h1>
        <div class="footer-text" style="letter-spacing: 5px;">LIVING RELICS</div>
    </div>
    <div class="footer-text">THE ETERNAL ASCENSION</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(22, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 35);

    const renderer = new THREE.WebGLRenderer({ antialias: true, stencil: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.8;
    document.body.appendChild(renderer.domElement);

    // --- ÖZEL TAŞ VE KABARTMA DOKUSU ---
    const loader = new THREE.TextureLoader();
    // Taşın o pürüzlü kumtaşı efektini yaratan shader tabanlı malzeme
    const pyramidMat = new THREE.MeshStandardMaterial({ 
        color: 0x2a1e15,
        roughness: 0.9,
        metalness: 0.1,
        flatShading: true // Kabartma hissi için poligonları belirginleştirir
    });

    const pyramidGroup = new THREE.Group();
    scene.add(pyramidGroup);

    const pyramid = new THREE.Mesh(new THREE.ConeGeometry(8, 12, 4), pyramidMat);
    pyramidGroup.add(pyramid);

    // --- RELIEF YÜZLER (TAŞA KAZINMIŞ GİBİ) ---
    const faceCount = 100;
    const reliefs = [];
    for(let i=0; i<faceCount; i++) {
        const side = i % 4;
        const row = Math.floor(i / 10);
        const angle = side * (Math.PI / 2);
        const radius = 6.4 - (row * 0.48);
        
        // Yüzleri taşa kazınmış heykelcikler gibi yapıyoruz
        const faceTex = loader.load(`https://i.pravatar.cc/100?u=${i}`);
        const faceMat = new THREE.MeshStandardMaterial({ 
            map: faceTex,
            transparent: true,
            opacity: 0.6,
            bumpMap: faceTex, // Yüzün hatlarını derinleştirir
            bumpScale: 0.2,
            color: 0x5a4a3a, // Taşa uyumlu renk tonu
            blending: THREE.MultiplyBlending // Taşa "kazınmış" efekti verir
        });

        const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), faceMat);
        plane.position.set(Math.cos(angle)*radius, (row * 1.0) - 5, Math.sin(angle)*radius);
        plane.rotation.y = angle;
        pyramidGroup.add(plane);
        reliefs.push(plane);
    }

    // --- ZİRVE (ALTIN SORU İŞARETİ) ---
    const qSprite = createQ();
    qSprite.position.y = 7.5;
    pyramidGroup.add(qSprite);

    function createQ() {
        const c = document.createElement('canvas'); c.width=512; c.height=512;
        const x = c.getContext('2d');
        x.font = "900 450px 'Cinzel'"; x.fillStyle="#fff"; x.textAlign="center"; x.textBaseline="middle";
        x.shadowColor="#d4af
