<html lang="tr">
<head>

    <style>

        body { margin: 0; background: #000; overflow: hidden; cursor: crosshair; }
        
        #ui {
            position: absolute; width: 100%; height: 100%;

            align-items: center; padding: 40px; z-index: 100; pointer-events: none;
        }

        #counter {

            color: #fff; margin: 0; letter-spacing: -5px; line-height: 0.9;
            background: linear-gradient(180deg, #fff 40%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 50px rgba(212,175,55,0.4));
        }

        .label { color: #d4af37; letter-spacing: 20px; font-size: 0.7rem; text-transform: uppercase; opacity: 0.5; }
    </style>
</head>
<body>

<div id="ui">
    <div style="text-align:center">
        <h1 id="counter">8,000,000,000</h1>
        <div class="label">Living Relics Collected</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(20, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4;
    document.body.appendChild(renderer.domElement);

    // --- ÖZEL SHADER MATERYALİ (Taş ve Altın Damarlar) ---
    const stoneMat = new THREE.MeshStandardMaterial({ 
        color: 0x0a0a0a,
        roughness: 0.8,
        metalness: 0.1,
        flatShading: false
    });

    const worldGroup = new THREE.Group();
    scene.add(worldGroup);

    // Ana Piramit (Devasa Granit)
    const pyramidGeo = new THREE.ConeGeometry(8, 11, 4);
    const pyramid = new THREE.Mesh(pyramidGeo, stoneMat);
    worldGroup.add(pyramid);

    // Zirvedeki Soru İşareti
    const qLabel = createQ();
    qLabel.position.y = 7;
    worldGroup.add(qLabel);

    function createQ() {
        const can = document.createElement('canvas'); can.width=1024; can.height=1024;
        const x = can.getContext('2d');
        x.font = "bold 600px 'Cinzel'"; x.fillStyle="#fff"; x.textAlign="center"; x.textBaseline="middle";
        x.shadowColor="#d4af37"; x.shadowBlur=100; x.fillText("?", 512, 512);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(can), blending: THREE.AdditiveBlending }));
        sprite.scale.set(6, 6, 1);
        return sprite;
    }

    // --- RELIEF YÜZLER (Taşın İçinden Sızanlar) ---
    const faces = [];
    for(let i=0; i<100; i++) {
        const side = i % 4;
        const row = Math.floor(i / 10);
        const angle = side * (Math.PI / 2);
        const radius = 6.4 - (row * 0.45);
        
        const faceTex = new THREE.TextureLoader().load(`https://i.pravatar.cc/100?u=${i}`);
        const faceMat = new THREE.MeshStandardMaterial({ 
            map: faceTex, 
            transparent: true, 
            opacity: 0.4, 
            color: 0x5a4a3a,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), faceMat);
