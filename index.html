<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ETERNAL NEXUS | PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@200;400&display=swap');
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; cursor: crosshair; }
        
        #ui { 
            position: absolute; top: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 5vh 0; pointer-events: none; z-index: 100;
        }

        .counter-box {
            text-align: center; border-left: 2px solid #d4af37; padding-left: 20px;
            background: linear-gradient(90deg, rgba(212,175,55,0.1) 0%, transparent 100%);
        }

        #number {
            font-family: 'Cinzel', serif; font-size: 3.5rem; color: #fff; margin: 0;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.4));
        }

        button {
            pointer-events: auto; background: transparent; color: #d4af37;
            border: 1px solid #d4af37; padding: 15px 50px; cursor: pointer;
            letter-spacing: 5px; transition: 0.3s; font-family: 'Cinzel';
        }
        button:hover { background: #d4af37; color: #000; box-shadow: 0 0 50px rgba(212,175,55,0.5); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="counter-box">
            <h1 id="number">7,984,102,540</h1>
            <div style="color:#d4af37; font-size:0.7rem; letter-spacing:5px;">LIVING MONUMENT NODES</div>
        </div>
        <button onclick="console.log('Ascending...')">ASCEND — 1 USD</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- ARKA PLAN (YILDIZLAR) ---
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(6000 * 3);
        for(let i=0; i<18000; i++) starPos[i] = (Math.random()-0.5)*150;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.05, color: 0xd4af37, transparent: true, opacity: 0.5 }));
        scene.add(stars);

        // --- PİRAMİT GRUBU ---
        const pyramidGroup = new THREE.Group();
        scene.add(pyramidGroup);

        // 1. ÜST KISIM (GERÇEK TAŞ)
        const topGeo = new THREE.ConeGeometry(6, 9, 4);
        const topMat = new THREE.MeshStandardMaterial({ 
            color: 0xc2b280, // Kumtaşı
            roughness: 0.9,
            metalness: 0.1
        });
        const stonePyramid = new THREE.Mesh(topGeo, topMat);
        pyramidGroup.add(stonePyramid);

        // 2. ALTIN SORU İŞARETİ
        const qCanvas = document.createElement('canvas');
        qCanvas.width = 256; qCanvas.height = 256;
        const qCtx = qCanvas.getContext('2d');
        qCtx.font = "bold 180px 'Cinzel'"; qCtx.fillStyle = "#FFD700";
        qCtx.textAlign = "center"; qCtx.textBaseline = "middle";
        qCtx.shadowColor = "#FFD700"; qCtx.shadowBlur = 30;
        qCtx.fillText("?", 128, 128);
        const qSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(qCanvas) }));
        qSprite.position.y = 5.5; qSprite.scale.set(3, 3, 1);
        pyramidGroup.add(qSprite);

        // --- YÜZLERİN DÖNGÜSÜ (PERFORMANS ODAKLI) ---
        const faceGroup = new THREE.Group();
        pyramidGroup.add(faceGroup);

        function createFaceTile() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.8 });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), mat);
            
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = `https://i.pravatar.cc/100?u=${Math.random()}`;
            img.onload = () => {
                ctx.filter = 'grayscale(100%) sepia(50%) contrast(1.2)';
                ctx.drawImage(img, 0, 0, 128, 128);
                tex.needsUpdate = true;
            };
            return mesh;
        }

        // Piramidin altına 40 tane yüzen fotoğraf ekleyelim
        for(let i=0; i<40; i++) {
            const tile = createFaceTile();
            tile.position.set((Math.random()-0.5)*8, (Math.random()*3)-4.5, (Math.random()-0.5)*8);
            faceGroup.add(tile);
        }

        // IŞIKLANDIRMA
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(5, 10, 7);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x333333));

        // MOUSE ETKİLEŞİMİ
        let targetRotationX = 0;
        let targetRotationY = 0;
        window.addEventListener('mousemove', (e) => {
            targetRotationY = (e.clientX / window.innerWidth - 0.5) * 1;
            targetRotationX = (e.clientY / window.innerHeight - 0.5) * 0.5;
        });

        // SAYAÇ
        let citizenCount = 7984102540;
        function animate() {
            requestAnimationFrame(animate);
            
            // Piramit Dönüşü + Mouse Takibi (Artık donmaz!)
            pyramidGroup.rotation.y += 0.005;
            pyramidGroup.rotation.y += (targetRotationY - pyramidGroup.rotation.y) * 0.05;
            pyramidGroup.rotation.x += (targetRotationX - pyramidGroup.rotation.x) * 0.05;

            // Yüzlerin Kendi İçinde Hareketi
            faceGroup.children.forEach((tile, i) => {
                tile.position.y += Math.sin(Date.now() * 0.001 + i) * 0.002;
                tile.lookAt(camera.position);
            });

            stars.rotation.y += 0.0002;
            qSprite.position.y = 5.5 + Math.sin(Date.now()*0.002)*0.1;
            
            citizenCount += Math.random() > 0.9 ? 1 : 0;
            document.getElementById('number').innerText = citizenCount.toLocaleString('en-US');

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
