<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ETERNAL MONUMENT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@200;400&display=swap');

        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        /* Premium Overlay */
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 5vh 0; pointer-events: none; z-index: 10;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.9) 100%);
        }

        h1 { 
            font-family: 'Cinzel', serif; font-size: clamp(2rem, 6vw, 4rem); 
            letter-spacing: 25px; color: #fff; margin: 0;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            background: linear-gradient(to bottom, #fff, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .cta-box { pointer-events: auto; text-align: center; }
        
        button {
            background: transparent; color: #d4af37; border: 1px solid #d4af37;
            padding: 20px 60px; font-size: 1rem; letter-spacing: 5px;
            cursor: pointer; transition: 0.5s; text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        button:hover { background: #d4af37; color: #000; box-shadow: 0 0 50px rgba(212,175,55,0.4); }

        #stats { position: absolute; bottom: 30px; left: 40px; color: rgba(212,175,55,0.4); font-size: 0.7rem; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>AETHER</h1>
        <div class="cta-box">
            <button onclick="alert('Digitalizing your essence...')">BECOME ETERNAL — 1 USD</button>
        </div>
    </div>

    <div id="stats">CITIZENS: 8,000,000,000<br>STATUS: EVOLVING</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.05);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, -2, 12);
        camera.lookAt(0, 3, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- DİNAMİK FOTOĞRAF DOKUSU (Gelişmiş Mozaik) ---
        const texSize = 1024;
        const canvas = document.createElement('canvas');
        canvas.width = texSize; canvas.height = texSize;
        const ctx = canvas.getContext('2d');
        const dynamicTexture = new THREE.CanvasTexture(canvas);

        // --- PİRAMİT (Siyah Kristal + Fotoğraf Kanalları) ---
        const geometry = new THREE.ConeGeometry(6, 9, 4);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x0a0a0a, 
            map: dynamicTexture,
            emissive: 0xd4af37,
            emissiveIntensity: 0.2, // Fotoğrafların hafif parlaması için
            roughness: 0.1, metalness: 0.9, flatShading: true 
        });
        const pyramid = new THREE.Mesh(geometry, material);
        scene.add(pyramid);

        // Altın İskelet (Lüks vurgu)
        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xd4af37, transparent: true, opacity: 0.2 }));
        pyramid.add(line);

        // --- ZİRVE: ALTIN SORU İŞARETİ (3D Efektli) ---
        const qCanvas = document.createElement('canvas');
        qCanvas.width = 512; qCanvas.height = 512;
        const qCtx = qCanvas.getContext('2d');
        qCtx.font = "bold 300px 'Cinzel', serif";
        qCtx.fillStyle = "#FFD700";
        qCtx.textAlign = "center";
        qCtx.textBaseline = "middle";
        qCtx.shadowColor = "#FFD700"; qCtx.shadowBlur = 40;
        qCtx.fillText("?", 256, 256);

        const qTexture = new THREE.CanvasTexture(qCanvas);
        const qMaterial = new THREE.SpriteMaterial({ map: qTexture, transparent: true });
        const questionMark = new THREE.Sprite(qMaterial);
        questionMark.position.set(0, 5.5, 0);
        questionMark.scale.set(3, 3, 1);
        scene.add(questionMark);

        // Işıklandırma
        const light = new THREE.PointLight(0xffffff, 2, 50);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x111111));

        // Kozmik Tozlar
        const partGeo = new THREE.BufferGeometry();
        const partCount = 1000;
        const posArray = new Float32Array(partCount * 3);
        for(let i=0; i<partCount*3; i++) posArray[i] = (Math.random()-0.5)*40;
        partGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particles = new THREE.Points(partGeo, new THREE.PointsMaterial({ size: 0.02, color: 0xd4af37, transparent: true, opacity: 0.5 }));
        scene.add(particles);

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            pyramid.rotation.y = time * 0.05;
            questionMark.position.y = 5.5 + Math.sin(time * 2) * 0.1;
            
            // FOTOĞRAF MOZAİĞİ SİMÜLASYONU
            // Siyah arka plan üzerine altın/beyaz/renkli pikseller yanıp sönüyor (insan yüzleri gibi)
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, texSize, texSize);
            for(let i=0; i<15; i++) {
                const x = Math.random() * texSize;
                const y = Math.random() * texSize;
                const size = Math.random() * 40 + 10;
                const hue = Math.random() > 0.8 ? 45 : 0; // Bazıları altın, çoğu beyaz/gri
                ctx.fillStyle = `hsla(${hue}, 100%, 70%, ${Math.random()})`;
                ctx.fillRect(x, y, size, size);
            }
            dynamicTexture.needsUpdate = true;
            material.emissiveIntensity = 0.1 + Math.sin(time * 3) * 0.05; // Titreşim efekti

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
