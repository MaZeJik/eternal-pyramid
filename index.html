<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ETERNAL NEXUS | LIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@200;400&display=swap');
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 40px 0; pointer-events: none; z-index: 100;
        }

        /* Sayaç Alanı */
        #counter-container {
            text-align: center; margin-top: 20px;
        }
        #main-counter {
            font-family: 'Cinzel', serif; font-size: 3.5rem; color: #fff;
            background: linear-gradient(to bottom, #fff, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            margin: 0;
        }
        .counter-label { color: #d4af37; letter-spacing: 5px; font-size: 0.8rem; text-transform: uppercase; }

        button {
            pointer-events: auto; background: rgba(0,0,0,0.8); color: #d4af37; 
            border: 1px solid #d4af37; padding: 15px 40px; cursor: pointer; 
            letter-spacing: 5px; transition: 0.5s; text-transform: uppercase;
            backdrop-filter: blur(10px);
        }
        button:hover { background: #d4af37; color: #000; box-shadow: 0 0 40px rgba(212,175,55,0.6); }
    </style>
</head>
<body>

    <div id="ui">
        <div id="counter-container">
            <h1 id="main-counter">0,000,000,000</h1>
            <div class="counter-label">Eternal Citizens Engraved</div>
        </div>
        
        <div style="margin-bottom: 30px;">
            <button onclick="addCitizen()">ASCEND NOW — 1 USD</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- SAHNE KURULUMU ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 18); // Piramidi küçültmek için kamerayı uzaklaştırdım

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- HAREKETLİ YILDIZ GÖKYÜZÜ ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 5000;
        const posArray = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) posArray[i] = (Math.random()-0.5)*100;
        starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ 
            size: 0.05, color: 0xffffff, transparent: true, opacity: 0.8 
        }));
        scene.add(stars);

        // --- YÜZ MOZAİĞİ SİSTEMİ ---
        const texSize = 1024;
        const canvas = document.createElement('canvas');
        canvas.width = texSize; canvas.height = texSize;
        const ctx = canvas.getContext('2d');
        const texture = new THREE.CanvasTexture(canvas);
        
        const faceImages = [];
        for(let i=0; i<30; i++) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = `https://i.pravatar.cc/100?u=${Math.random()}`;
            faceImages.push(img);
        }

        function drawMosaic() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, texSize, texSize);
            const cols = 12; const rows = 6;
            const w = texSize / cols; const h = (texSize/2) / rows;
            
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    const img = faceImages[Math.floor(Math.random()*faceImages.length)];
                    if(img.complete) {
                        ctx.filter = 'grayscale(100%) brightness(60%)';
                        ctx.drawImage(img, c*w, (texSize/2)+(r*h), w-2, h-2);
                    }
                    ctx.strokeStyle = 'rgba(212,175,55,0.2)';
                    ctx.strokeRect(c*w, (texSize/2)+(r*h), w, h);
                }
            }
            texture.needsUpdate = true;
        }

        // --- PİRAMİT VE SORU İŞARETİ ---
        const pyramid = new THREE.Mesh(
            new THREE.ConeGeometry(5, 7, 4), // Boyutlar ufaltıldı
            new THREE.MeshStandardMaterial({ map: texture, metalness: 0.7, roughness: 0.2 })
        );
        scene.add(pyramid);

        const qSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
            map: new THREE.CanvasTexture(createQMark()), transparent: true 
        }));
        qSprite.position.y = 4.5; qSprite.scale.set(2.5, 2.5, 1);
        scene.add(qSprite);

        function createQMark() {
            const c = document.createElement('canvas');
            c.width = 256; c.height = 256;
            const cx = c.getContext('2d');
            cx.font = "bold 160px 'Cinzel'"; cx.fillStyle = "#d4af37";
            cx.textAlign = "center"; cx.textBaseline = "middle";
            cx.fillText("?", 128, 128);
            return c;
        }

        // IŞIKLAR
        const pLight = new THREE.PointLight(0xffffff, 1.5);
        pLight.position.set(5, 5, 10);
        scene.add(pLight);
        scene.add(new THREE.AmbientLight(0x222222));

        // --- SAYAÇ MANTIĞI ---
        let currentCitizens = 7842930412; // Başlangıç (Sahte ama yüksek rakam)
        const counterEl = document.getElementById('main-counter');

        function updateCounter() {
            currentCitizens += Math.floor(Math.random() * 3); // Sürekli artış simülasyonu
            counterEl.innerText = currentCitizens.toLocaleString('en-US').replace(/,/g, ',');
        }

        function addCitizen() {
            currentCitizens += 1;
            alert("Ruhunuz anıta eklendi.");
        }

        // --- ANİMASYON ---
        function animate() {
            requestAnimationFrame(animate);
            pyramid.rotation.y += 0.005;
            stars.rotation.y += 0.0002; // Gökyüzü yavaşça döner
            stars.position.z += 0.01; if(stars.position.z > 10) stars.position.z = 0; // Yıldızlar bize doğru akar
            
            if(Math.random() > 0.97) drawMosaic(); // Yüzler döngüde değişir
            updateCounter();
            
            renderer.render(scene, camera);
        }
        
        setTimeout(drawMosaic, 1000);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
