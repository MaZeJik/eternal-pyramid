<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ETERNAL PYRAMID | NEXUS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap');
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 40px 0; pointer-events: none; z-index: 100;
        }

        /* Sayaç - Modern ve Şık */
        .counter-box {
            text-align: center; background: rgba(0,0,0,0.6);
            padding: 15px 30px; border: 1px solid rgba(212,175,55,0.4);
            backdrop-filter: blur(15px); border-radius: 2px;
        }
        #number {
            font-family: 'Cinzel', serif; font-size: 3rem; color: #fff; margin: 0;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        .label { color: #d4af37; font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; }

        button {
            pointer-events: auto; background: transparent; color: #fff;
            border: 1px solid #d4af37; padding: 15px 45px;
            font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 3px;
            cursor: pointer; transition: 0.4s;
        }
        button:hover { background: #d4af37; color: #000; box-shadow: 0 0 30px rgba(212,175,55,0.4); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="counter-box">
            <h1 id="number">7,984,102,540</h1>
            <div class="label">Living Legacy Count</div>
        </div>
        <button onclick="alert('Digital soul scanning...')">ETERNALİZE YOURSELF</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ARKA PLAN: HAREKETLİ YILDIZLAR ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 4000;
        const starPos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random()-0.5)*120;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.05, color: 0xffffff }));
        scene.add(stars);

        // --- DOKU SİSTEMİ: TAŞ DOKUSU + İNSAN YÜZLERİ ---
        const texSize = 1024;
        const canvas = document.createElement('canvas');
        canvas.width = texSize; canvas.height = texSize;
        const ctx = canvas.getContext('2d');
        const texture = new THREE.CanvasTexture(canvas);

        const faceImages = [];
        for(let i=0; i<30; i++) {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = `https://i.pravatar.cc/150?u=${i + Math.random()}`;
            faceImages.push(img);
        }

        function drawPyramidTexture() {
            // Piramit Gövdesi: Gerçek Kumtaşı Rengi
            ctx.fillStyle = '#c2b280'; 
            ctx.fillRect(0, 0, texSize, texSize);
            
            // Taş dokusu efekti (Noktacıklar)
            for(let i=0; i<2000; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.1})`;
                ctx.fillRect(Math.random()*texSize, Math.random()*texSize, 2, 2);
            }

            // Alt Kısımlardaki İnsan Yüzleri (Küçük kareler halinde)
            const rows = 8; const cols = 16;
            const w = texSize / cols; const h = (texSize/2.5) / rows;
            const startY = texSize - (rows * h);

            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    const img = faceImages[Math.floor(Math.random()*faceImages.length)];
                    if(img.complete) {
                        ctx.save();
                        ctx.globalAlpha = 0.8;
                        // Hafif sepia/taş rengi efekti vermek için
                        ctx.filter = 'contrast(1.2) brightness(0.9)';
                        ctx.drawImage(img, c*w, startY + (r*h), w-4, h-4);
                        ctx.restore();
                    }
                    // Altın çerçeve dokunuşu
                    ctx.strokeStyle = 'rgba(212,175,55,0.3)';
                    ctx.strokeRect(c*w, startY + (r*h), w, h);
                }
            }
            texture.needsUpdate = true;
        }

        // --- PİRAMİT GÖVDESİ ---
        const pyramid = new THREE.Mesh(
            new THREE.ConeGeometry(6, 9, 4),
            new THREE.MeshStandardMaterial({ map: texture, metalness: 0.3, roughness: 0.8 })
        );
        scene.add(pyramid);

        // --- ALTIN SORU İŞARETİ (ZİRVE) ---
        const qCanvas = document.createElement('canvas');
        qCanvas.width = 256; qCanvas.height = 256;
        const qCtx = qCanvas.getContext('2d');
        qCtx.font = "bold 180px 'Cinzel'"; 
        qCtx.fillStyle = "#FFD700"; qCtx.textAlign = "center"; qCtx.textBaseline = "middle";
        qCtx.shadowColor = "#FFD700"; qCtx.shadowBlur = 20;
        qCtx.fillText("?", 128, 128);

        const qSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(qCanvas) }));
        qSprite.position.y = 5.5; qSprite.scale.set(3, 3, 1);
        scene.add(qSprite);

        // IŞIKLANDIRMA
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 7);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x444444));

        // SAYAÇ VE ANİMASYON
        let citizenCount = 7984102540;
        function animate() {
            requestAnimationFrame(animate);
            
            pyramid.rotation.y += 0.004;
            stars.rotation.y += 0.0003;
            qSprite.position.y = 5.5 + Math.sin(Date.now()*0.002)*0.1;

            if(Math.random() > 0.98) drawPyramidTexture(); // Yüzlerin döngüsel değişimi
            
            citizenCount += Math.floor(Math.random()*2);
            document.getElementById('number').innerText = citizenCount.toLocaleString('en-US');

            renderer.render(scene, camera);
        }

        setTimeout(drawPyramidTexture, 1000);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
