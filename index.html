<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ETERNAL NEXUS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@100;300;600&display=swap');
        
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        /* Katmanlı UI */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 60px 0; pointer-events: none; z-index: 10;
        }

        /* Sayacı bir "Dashboard" gibi yaptık */
        .counter-box {
            text-align: center; background: rgba(0,0,0,0.4);
            padding: 20px 40px; border-top: 1px solid rgba(212,175,55,0.3);
            border-bottom: 1px solid rgba(212,175,55,0.3);
            backdrop-filter: blur(10px);
        }
        
        #number {
            font-family: 'Cinzel', serif; font-size: clamp(2rem, 6vw, 4rem);
            color: #fff; margin: 0; letter-spacing: 10px;
            text-shadow: 0 0 30px rgba(212,175,55,0.6);
        }

        .label { color: #d4af37; font-size: 0.7rem; letter-spacing: 8px; text-transform: uppercase; margin-top: 10px; }

        /* Buton: Ultra Premium */
        button {
            pointer-events: auto; background: transparent; color: #fff;
            border: 1px solid #d4af37; padding: 20px 60px;
            font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 4px;
            cursor: pointer; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
        }
        button:hover { background: #d4af37; color: #000; box-shadow: 0 0 60px rgba(212,175,55,0.4); }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="counter-box">
            <h1 id="number">7,942,105,384</h1>
            <div class="label">Humanity Encrypted in Nexus</div>
        </div>
        
        <button onclick="addEntry()">ETERNALİZE YOURSELF</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 22);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- KOZMİK ARKA PLAN (BULUTSU VE YILDIZLAR) ---
        function createStars() {
            const geo = new THREE.BufferGeometry();
            const count = 8000;
            const pos = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) pos[i] = (Math.random()-0.5)*150;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0.6 }));
        }
        const stars = createStars();
        scene.add(stars);

        // --- GERÇEK YÜZLERİN DÖNGÜSÜ (TEXTURE) ---
        const texSize = 1024;
        const canvas = document.createElement('canvas');
        canvas.width = texSize; canvas.height = texSize;
        const ctx = canvas.getContext('2d');
        const texture = new THREE.CanvasTexture(canvas);

        const faceUrls = Array.from({length: 40}, (_, i) => `https://i.pravatar.cc/150?u=${i+Math.random()}`);
        const loadedImages = [];
        faceUrls.forEach(url => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = url;
            img.onload = () => loadedImages.push(img);
        });

        function updateTexture() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, texSize, texSize);
            const size = texSize / 10;
            for(let y=5; y<10; y++) { // Sadece alt kısım
                for(let x=0; x<10; x++) {
                    const img = loadedImages[Math.floor(Math.random()*loadedImages.length)];
                    if(img) {
                        ctx.globalAlpha = 0.7;
                        ctx.filter = 'grayscale(100%) contrast(150%)';
                        ctx.drawImage(img, x*size, y*size, size-1, size-1);
                    }
                    ctx.strokeStyle = '#d4af37';
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(x*size, y*size, size, size);
                }
            }
            texture.needsUpdate = true;
        }

        // --- PİRAMİT ---
        const pyramidGeo = new THREE.ConeGeometry(8, 11, 4);
        const pyramidMat = new THREE.MeshStandardMaterial({ 
            map: texture, metalness: 0.9, roughness: 0.1, 
            emissive: 0xd4af37, emissiveIntensity: 0.02 
        });
        const pyramid = new THREE.Mesh(pyramidGeo, pyramidMat);
        scene.add(pyramid);

        // --- ALTIN SORU İŞARETİ (ZİRVE) ---
        const qSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
            map: new THREE.CanvasTexture(drawQ()), transparent: true 
        }));
        qSprite.position.y = 7; qSprite.scale.set(4, 4, 1);
        scene.add(qSprite);

        function drawQ() {
            const c = document.createElement('canvas'); c.width=256; c.height=256;
            const x = c.getContext('2d');
            x.font = "bold 200px 'Cinzel'"; x.fillStyle="#fff"; x.textAlign="center"; x.textBaseline="middle";
            x.shadowColor="#d4af37"; x.shadowBlur=30; x.fillText("?", 128, 128);
            return c;
        }

        // IŞIKLAR
        const light1 = new THREE.PointLight(0xd4af37, 2, 50);
        light1.position.set(10, 10, 10);
        scene.add(light1);
        scene.add(new THREE.AmbientLight(0x111111));

        // SAYAÇ MANTIĞI
        let count = 7942105384;
        function updateCounter() {
            count += Math.floor(Math.random()*5);
            document.getElementById('number').innerText = count.toLocaleString('en-US');
        }

        function addEntry() {
            count += 100;
            updateTexture(); // Yeni birileri gelince dokuyu yenile
        }

        function animate() {
            requestAnimationFrame(animate);
            pyramid.rotation.y += 0.004;
            stars.rotation.y += 0.0005;
            stars.position.z += 0.02; if(stars.position.z > 20) stars.position.z = 0;
            
            if(Math.random() > 0.98) updateTexture();
            updateCounter();
            renderer.render(scene, camera);
        }
        
        setTimeout(updateTexture, 1500);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
