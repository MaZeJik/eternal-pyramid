<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>NEXUS | BEYOND THE LIMIT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@100&display=swap');
        body { margin: 0; background: #000; overflow: hidden; cursor: none; }
        
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 40px; z-index: 1000; pointer-events: none;
        }

        #counter-master {
            font-family: 'Cinzel', serif; font-size: 10vw; color: #fff;
            background: linear-gradient(180deg, #fff 20%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 100px rgba(212,175,55,0.6));
            letter-spacing: -8px; line-height: 0.8;
        }

        .status-bar {
            width: 300px; height: 1px; background: rgba(212,175,55,0.3);
            position: relative; margin-top: 20px;
        }
        .status-fill {
            width: 80%; height: 100%; background: #d4af37;
            box-shadow: 0 0 20px #d4af37;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div style="text-align: center;">
        <h1 id="counter-master">8,000,000,000</h1>
        <div class="status-bar"><div class="status-fill"></div></div>
        <div style="color:#d4af37; font-family:Cinzel; letter-spacing:10px; font-size:0.6rem; margin-top:10px;">QUANTUM ASCENSION ACTIVE</div>
    </div>
    <div style="color:rgba(255,255,255,0.2); font-family:Montserrat; letter-spacing:20px; font-size:0.5rem;">LIMITLESS / BEYOND</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(12, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 60);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.5;
    document.body.appendChild(renderer.domElement);

    const masterGroup = new THREE.Group();
    scene.add(masterGroup);

    // --- PARÇALANMIŞ MONOLİT (Kinetik Parçalar) ---
    const pyramidMat = new THREE.MeshStandardMaterial({ 
        color: 0x050505, roughness: 0.1, metalness: 1, flatShading: true 
    });

    const segments = [];
    for(let i=0; i<4; i++) { // Piramidi 4 ana dilime bölüyoruz
        const geo = new THREE.ConeGeometry(8, 3, 4, 1, false, (i * Math.PI)/2, Math.PI/2);
        const part = new THREE.Mesh(geo, pyramidMat);
        part.position.y = (i * 3) - 4.5;
        masterGroup.add(part);
        segments.push({ mesh: part, offset: i * 0.5 });
    }

    // --- VERİ BULUTU (8 Milyar İnsan Tozu) ---
    const particlesGeo = new THREE.BufferGeometry();
    const pCount = 20000;
    const posArray = new Float32Array(pCount * 3);
    for(let i=0; i<pCount*3; i++) posArray[i] = (Math.random() - 0.5) * 100;
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const particlesMat = new THREE.PointsMaterial({ size: 0.02, color: 0xd4af37, transparent: true, opacity: 0.4 });
    const particleSystem = new THREE.Points(particlesGeo, particlesMat);
    scene.add(particleSystem);

    // --- IŞIK (Karanlığı Delen Altın) ---
    const topLight = new THREE.RectAreaLight(0xd4af37, 20, 10, 10);
    topLight.position.set(0, 20, 0);
    scene.add(topLight);
