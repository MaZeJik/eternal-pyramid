<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ETERNAL PYRAMID NEXUS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap');

        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; color: #d4af37; }
        
        /* Üst Başlık */
        #header {
            position: absolute; top: 40px; width: 100%; text-align: center; z-index: 10; pointer-events: none;
        }
        h1 { 
            font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 12px; margin: 0;
            background: linear-gradient(to bottom, #fff, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }
        .subtitle { letter-spacing: 8px; font-size: 1.2rem; opacity: 0.8; margin-top: 5px; }

        /* Buton: Altın Çerçeveli */
        #footer {
            position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 10;
        }
        button {
            background: transparent; color: #d4af37; border: 1px solid #d4af37;
            padding: 12px 45px; font-size: 0.9rem; font-family: 'Montserrat', sans-serif;
            letter-spacing: 4px; cursor: pointer; transition: 0.4s; text-transform: uppercase;
        }
        button:hover { background: #d4af37; color: #000; box-shadow: 0 0 40px rgba(212,175,55,0.4); }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="header">
        <h1>THE ETERNAL PYRAMID</h1>
        <div class="subtitle">NEXUS</div>
    </div>

    <div id="footer">
        <button onclick="alert('Digitalizing your identity...')">ASCEND — 1 USD</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- DİNAMİK YÜZ MOZAİĞİ SİSTEMİ ---
        const rows = 10;
        const cols = 20;
        const texSize = 2048;
        const canvas = document.createElement('canvas');
        canvas.width = texSize; canvas.height = texSize;
        const ctx = canvas.getContext('2d');
        const texture = new THREE.CanvasTexture(canvas);

        const faces = [];
        // İlk başta 50 tane gerçek yüz görseli yükle (Placeholder)
        for(let i=0; i<50; i++) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = `https://i.pravatar.cc/150?u=${Math.random()}`;
            faces.push(img);
        }

        function drawNexus() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, texSize, texSize);

            const w = texSize / cols;
            const h = texSize / rows;

            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    const img = faces[Math.floor(Math.random() * faces.length)];
                    if(img.complete) {
                        // Fotoğrafları siyah-beyaz ve loş yap (Görseldeki gibi lüks dursun)
                        ctx.filter = 'grayscale(100%) brightness(50%) contrast(120%)';
                        ctx.drawImage(img, c * w, r * h, w-4, h-4);
                        ctx.filter = 'none';
                        
                        // Altın ızgara çizgileri
                        ctx.strokeStyle = 'rgba(212, 175, 55, 0.2)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(c * w, r * h, w, h);
                    }
                }
            }
            texture.needsUpdate = true;
        }

        // --- PİRAMİT GÖVDESİ ---
        const geometry = new THREE.ConeGeometry(7, 10, 4);
        const material = new THREE.MeshStandardMaterial({ 
            map: texture, 
            roughness: 0.2, 
            metalness: 0.8,
            emissive: 0xd4af37,
            emissiveIntensity: 0.05
        });
        const pyramid = new THREE.Mesh(geometry, material);
        scene.add(pyramid);

        // --- GOLDEN QUESTION MARK (ZİRVE) ---
        const qCanvas = document.createElement('canvas');
        qCanvas.width = 512; qCanvas.height = 512;
        const qCtx = qCanvas.getContext('2d');
        qCtx.font = "bold 380px 'Cinzel', serif";
        qCtx.fillStyle = "#FFD700";
        qCtx.textAlign = "center";
        qCtx.textBaseline = "middle";
        qCtx.shadowColor = "#FFD700"; qCtx.shadowBlur = 40;
        qCtx.fillText("?", 256, 256);

        const qTexture = new THREE.CanvasTexture(qCanvas);
        const qSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: qTexture, transparent: true }));
        qSprite.position.y = 6.2;
        qSprite.scale.set(3.5, 3.5, 1);
        scene.add(qSprite);

        // IŞIKLANDIRMA
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x222222));

        // ARKA PLAN: YILDIZ TOZLARI
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1500;
        const posArray = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) posArray[i] = (Math.random()-0.5)*50;
        starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.03, color: 0xd4af37, transparent: true, opacity: 0.5 }));
        scene.add(stars);

        // ANİMASYON DÖNGÜSÜ
        let tick = 0;
        function animate() {
            requestAnimationFrame(animate);
            tick++;
            
            pyramid.rotation.y += 0.003;
            qSprite.position.y = 6.2 + Math.sin(tick * 0.05) * 0.1;
            stars.rotation.y += 0.0005;

            // Her 3 saniyede bir rastgele yüzleri güncelle
            if(tick % 180 === 0) drawNexus();

            renderer.render(scene, camera);
        }

        // Başlangıç için görsellerin yüklenmesini bekle
        setTimeout(() => {
            drawNexus();
            animate();
        }, 1500);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
