<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE ETERNAL NEXUS | FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; cursor: crosshair; }
        
        #ui {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center; padding: 8vh;
            z-index: 100; pointer-events: none;
        }

        #counter {
            font-family: 'Cinzel', serif; font-size: clamp(3rem, 10vw, 8rem);
            color: #fff; margin: 0; letter-spacing: -5px;
            background: linear-gradient(180deg, #ffffff 30%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 50px rgba(212,175,55,0.4));
        }

        .label { color: #d4af37; letter-spacing: 20px; font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; font-family: 'Cinzel'; }
    </style>
</head>
<body>

<div id="ui">
    <div style="text-align:center">
        <h1 id="counter">8,000,000,000</h1>
        <div class="label">Living Relics</div>
    </div>
    <div class="label" style="letter-spacing: 10px; opacity: 0.3;">The Eternal Ascension</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(22, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.6;
    document.body.appendChild(renderer.domElement);

    const anchor = new THREE.Group();
    scene.add(anchor);

    // --- PROCEDURAL STONE TEXTURE ---
    const canvas = document.createElement('canvas');
    canvas.width = 1024; canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#111'; ctx.fillRect(0,0,1024,1024);
    for(let i=0; i<50000; i++) {
        ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.08})`;
        ctx.fillRect(Math.random()*1024, Math.random()*1024, 2, 2);
    }
    const stoneTex = new THREE.CanvasTexture(canvas);
    stoneTex.wrapS = stoneTex.wrapT = THREE.RepeatWrapping;

    // --- THE MONOLITH ---
    const pyramidMat = new THREE.MeshStandardMaterial({ 
        map: stoneTex, bumpMap: stoneTex, bumpScale: 0.4,
        color: 0x1a1a1a, roughness: 0.9, metalness: 0.1
    });
    const monolith = new THREE.Mesh(new THREE.ConeGeometry(8, 12, 4), pyramidMat);
    anchor.add(monolith);

    // --- RELIEF FACES (KAZINMIŞ YÜZLER) ---
    const faces = [];
    const loader = new THREE.TextureLoader();
    for(let i=0; i<100; i++) {
        const side = i % 4;
        const row = Math.floor(i / 10);
        const angle = side * (Math.PI / 2);
        const radius = 6.45 - (row * 0.48);
        
        const tex = loader.load(`https://i.pravatar.cc/100?u=${i + 150}`);
        const faceMat = new THREE.MeshStandardMaterial({ 
            map: tex, bumpMap: tex, bumpScale: -0.25,
            transparent: true, opacity: 0.5, color: 0x444,
            blending: THREE.MultiplyBlending 
        });
        
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), faceMat);
        plane.position.set(Math.cos(angle)*radius, (row * 1.0) - 5, Math.sin(angle)*radius);
        plane.rotation.y = angle;
        anchor.add(plane);
    }

    // --- GOLDEN APEX ---
    const qCan = document.createElement('canvas'); qCan.width=512; qCan.height=512;
    const qCtx = qCan.getContext('2d');
    qCtx.font = "900 400px 'Cinzel'"; qCtx.fillStyle = "#fff"; qCtx.textAlign="center"; qCtx.textBaseline="middle";
    qCtx.shadowColor = "#d4af37"; qCtx.shadowBlur = 50; qCtx.fillText("?", 256, 256);
    const qSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
        map: new THREE.CanvasTexture(qCan), blending: THREE.AdditiveBlending 
    }));
    qSprite.position.y = 7.5; qSprite.scale.set(6, 6, 1);
    anchor.add(qSprite);

    // --- DIVINE LIGHTING ---
    const sun = new THREE.DirectionalLight(0xd4af37, 2.5);
    sun.position.set(10, 10, 10);
    scene.add(sun);
    
    const fill = new THREE.PointLight(0xffffff, 0.5, 50);
    fill.position.set(-10, 5, 5);
    scene.add(fill);

    // --- FINAL PHYSICS ---
    let tX = 0, tY = 0, cX = 0, cY = 0;
    window.addEventListener('mousemove', (e) => {
        tX = (e.clientX - window.innerWidth/2) * 0.0004;
        tY = (e.clientY - window.innerHeight/2) * 0.0004;
    });

    function animate() {
        requestAnimationFrame(animate);
        cX += (tX - cX) * 0.05; // Smooth inertia
        cY += (tY - cY) * 0.05;
        
        anchor.rotation.y += 0.0015 + cX;
        anchor.rotation.x += (cY - anchor.rotation.x) * 0.05;
        
        qSprite.position.y = 7.5 + Math.sin(Date.now()*0.002)*0.2;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
