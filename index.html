        const texSize = 2048; // Yüksek çözünürlük
        const canvas = document.createElement('canvas');
        canvas.width = texSize; canvas.height = texSize;
        const ctx = canvas.getContext('2d');
        const texture = new THREE.CanvasTexture(canvas);

        // Rastgele yüzler için bir havuz (Placeholder servisinden)
        const faceImages = [];

            img.src = `https://i.pravatar.cc/150?u=${Math.random()}`;
            faceImages.push(img);
        }

        function drawPyramidTexture() {
            // Üst Kısım: Gerçek Taş Dokusu
            ctx.fillStyle = '#3d2b1f'; // Koyu kumtaşı
            ctx.fillRect(0, 0, texSize, texSize);
            
            // Alt Kısım: İnsan Yüzleri Mozaiği
            const rows = 12;
            const cols = 24;
            const cellW = texSize / cols;
            const cellH = (texSize / 2) / rows;

            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    const randomImg = faceImages[Math.floor(Math.random() * faceImages.length)];
                    if(randomImg.complete) {
                        ctx.drawImage(randomImg, c * cellW, (texSize/2) + (r * cellH), cellW - 1, cellH - 1);
                    }
                    // Üzerine hafif bir "eskimiş taş" filtresi
                    ctx.fillStyle = 'rgba(61, 43, 31, 0.3)';
                    ctx.fillRect(c * cellW, (texSize/2) + (r * cellH), cellW, cellH);
                }
            }
            texture.needsUpdate = true;
        }

        // --- PİRAMİT GÖVDESİ ---
        const geometry = new THREE.ConeGeometry(6, 9, 4);
        const material = new THREE.MeshStandardMaterial({ 
            map: texture,
            roughness: 0.9,
            metalness: 0.2
        });
        const pyramid = new THREE.Mesh(geometry, material);
        scene.add(pyramid);
