<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ETERNAL NEXUS | SIGNATURE EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@100;400&display=swap');
        body { margin: 0; background: #000; overflow: hidden; cursor: crosshair; }
        
        /* Premium UI Layer */
        #ui {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 40px 0; z-index: 10; pointer-events: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px 60px; text-align: center;
        }

        #number {
            font-family: 'Cinzel', serif; font-size: 4rem; color: #fff; margin: 0;
            background: linear-gradient(to bottom, #fff 30%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .cta-btn {
            pointer-events: auto; background: #d4af37; color: #000;
            border: none; padding: 18px 60px; font-family: 'Cinzel';
            font-size: 1rem; letter-spacing: 5px; cursor: pointer;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .cta-btn:hover { letter-spacing: 10px; box-shadow: 0 0 50px #d4af37; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="ui">
    <div class="glass-panel">
        <h1 id="number">7,984,102,540</h1>
        <div style="color:#d4af37; letter-spacing:8px; font-size:0.7rem; margin-top:10px;">HUMANITY CORE INDEX</div>
    </div>
    <button class="cta-btn" onclick="alert('Ascension sequence locked.')">BECOME ETERNAL</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 22);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- KOZMİK DERİNLİK (Nebula Etkisi) ---
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(8000 * 3);
    for(let i=0; i<24000; i++) starPos[i] = (Math.random()-0.5)*200;
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.08, color: 0xd4af37, transparent: true, opacity: 0.4 }));
    scene.add(stars);

    // --- PİRAMİT: GERÇEKÇİ KİTLE ---
    const pyramidGroup = new THREE.Group();
    scene.add(pyramidGroup);

    const stoneMat = new THREE.MeshStandardMaterial({ 
        color: 0x3d2b1f, roughness: 0.8, metalness: 0.2,
        flatShading: true // Taş blokları hissi verir
    });
    const pyramidBody = new THREE.Mesh(new THREE.ConeGeometry(7, 10, 4), stoneMat);
    pyramidGroup.add(pyramidBody);

    // --- ALTIN ZİRVE (Soru İşareti Değil, Bir Enerji Kaynağı) ---
    const qCanvas = document.createElement('canvas');
    qCanvas.width = 512; qCanvas.height = 512;
    const qCtx = qCanvas.getContext('2d');
    qCtx.font = "bold 400px 'Cinzel'";
    qCtx.fillStyle = "#fff"; qCtx.textAlign = "center"; qCtx.textBaseline = "middle";
    qCtx.shadowColor = "#d4af37"; qCtx.shadowBlur = 40;
    qCtx.fillText("?", 256, 256);
    
    const qSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(qCanvas) }));
    qSprite.position.y = 6.5; qSprite.scale.set(4, 4, 1);
    pyramidGroup.add(qSprite);

    // --- YAŞAYAN YÜZLER (PARTICLE SİSTEMİ) ---
    // Fotoğrafları piramidin etrafında dönen ruhlar gibi yapıyoruz (Donma yapmaz!)
    const faceCount = 60;
    const faces = [];
    for(let i=0; i<faceCount; i++) {
        const can = document.createElement('canvas'); can.width=128; can.height=128;
        const cx = can.getContext('2d');
        const tex = new THREE.CanvasTexture(can);
        const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.7), mat);
        
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = `https://i.pravatar.cc/100?u=${Math.random()}`;
        img.onload = () => {
            cx.filter = 'grayscale(100%) contrast(1.5)';
            cx.drawImage(img, 0, 0, 128, 128);
            tex.needsUpdate = true;
        };

        // Başlangıç pozisyonları (Piramit etrafında halka şeklinde)
        const angle = (i / faceCount) * Math.PI * 2;
        const radius = 8 + Math.random() * 2;
        plane.position.set(Math.cos(angle)*radius, (Math.random()*6)-3, Math.sin(angle)*radius);
        
        scene.add(plane);
        faces.push({ mesh: plane, angle: angle, speed: 0.002 + Math.random()*0.005 });
    }

    // IŞIKLANDIRMA (Sinematik)
    const pLight = new THREE.PointLight(0xd4af37, 2, 50);
    pLight.position.set(0, 8, 5);
    scene.add(pLight);
    scene.add(new THREE.AmbientLight(0x222222));

    // INTERACTION
    let mouseX = 0, mouseY = 0;
    window.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX - window.innerWidth/2) * 0.0005;
        mouseY = (e.clientY - window.innerHeight/2) * 0.0005;
    });

    let count = 7984102540;
    function animate() {
        requestAnimationFrame(animate);
        
        pyramidGroup.rotation.y += 0.002;
        pyramidGroup.rotation.y += mouseX;
        pyramidGroup.rotation.x += mouseY;

        // Yüzlerin Dansı (Piramit etrafında dönerler)
        faces.forEach(f => {
            f.angle += f.speed;
            f.mesh.position.x = Math.cos(f.angle) * 9;
            f.mesh.position.z = Math.sin(f.angle) * 9;
            f.mesh.lookAt(0, 0, 0);
        });

        stars.rotation.y += 0.0001;
        qSprite.position.y = 6.5 + Math.sin(Date.now()*0.002)*0.2;

        count += Math.random() > 0.9 ? 1 : 0;
        document.getElementById('number').innerText = count.toLocaleString('en-US');

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
