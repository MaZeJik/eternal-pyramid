<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE ETERNAL NEXUS | UNLEASHED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@100;300&display=swap');
        body { margin: 0; background: #000; overflow: hidden; cursor: none; }
        
        #ui {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 40px; z-index: 100; pointer-events: none;
        }

        #counter-wrap { text-align: center; transform: translateY(20px); opacity: 0.9; }
        #number {
            font-family: 'Cinzel', serif; font-size: 6vw; color: #fff; margin: 0;
            letter-spacing: -2px; line-height: 0.8;
            background: linear-gradient(180deg, #fff 0%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Mouse takip eden halka */
        #cursor {
            width: 40px; height: 40px; border: 1px solid #d4af37;
            border-radius: 50%; position: fixed; pointer-events: none;
            transition: transform 0.1s; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="ui">
    <div id="counter-wrap">
        <h1 id="number">8,000,000,000</h1>
        <div style="color:#d4af37; letter-spacing:15px; font-size:0.7rem; margin-top:10px;">HUMANITY COLLECTIVE</div>
    </div>
    <div style="color:rgba(212,175,55,0.4); font-family:Cinzel; font-size:0.8rem; letter-spacing:5px;">SCROLL TO ASCEND</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.05);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    // Kamerayı piramidin içine/dibine yerleştirdik
    camera.position.set(0, 0.5, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // --- MONOLİTİK PİRAMİT (DEVASA BLOKLAR) ---
    const pyramidGroup = new THREE.Group();
    scene.add(pyramidGroup);

    // Ana gövdeyi parçalı ve daha "ağır" yaptık
    const geometry = new THREE.ConeGeometry(10, 15, 4);
    const material = new THREE.MeshStandardMaterial({ 
        color: 0x111111, roughness: 0.2, metalness: 0.9, flatShading: true 
    });
    const mainPyramid = new THREE.Mesh(geometry, material);
    pyramidGroup.add(mainPyramid);

    // --- ALTIN KENARLAR (Wireframe Glow) ---
    const wireframe = new THREE.Mesh(
        geometry,
        new THREE.MeshBasicMaterial({ color: 0xd4af37, wireframe: true, transparent: true, opacity: 0.1 })
    );
    pyramidGroup.add(wireframe);

    // --- YÜZLER DUVARI (SİSTEMATİK AKIŞ) ---
    const faces = [];
    const faceCount = 120;
    for(let i=0; i<faceCount; i++) {
        const tex = new THREE.TextureLoader().load(`https://i.pravatar.cc/150?u=${i}`);
        const mat = new THREE.MeshBasicMaterial({ 
            map: tex, transparent: true, opacity: 0.4, side: THREE.DoubleSide 
        });
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.5), mat);
        
        // Piramidin yüzeyine yakın, grid şeklinde dizilim
        const angle = (i % 4) * (Math.PI / 2);
        const y = (Math.floor(i/4) * 0.6) - 5;
        const radius = 5.1 - (y * 0.4);
        
        plane.position.set(Math.cos(angle)*radius, y, Math.sin(angle)*radius);
        plane.rotation.y = angle;
        pyramidGroup.add(plane);
        faces.push(plane);
    }

    // --- IŞIKLANDIRMA ---
    const topLight = new THREE.PointLight(0xd4af37, 5, 20);
    topLight.position.set(0, 8, 0);
    scene.add(topLight);

    const ambLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambLight);

    // --- MOUSE & CURSOR ---
    const cursor = document.getElementById('cursor');
    let mX = 0, mY = 0;
    window.addEventListener('mousemove', (e) => {
        mX = (e.clientX / window.innerWidth - 0.5) * 2;
        mY = (e.clientY / window.innerHeight - 0.5) * 2;
        cursor.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
    });

    // --- ANİMASYON ---
    let countVal = 8000000000;
    function animate() {
        requestAnimationFrame(animate);
        
        // Sinematik kamera hareketi
        camera.position.x += (mX * 2 - camera.position.x) * 0.05;
        camera.position.y += (-mY * 2 + 0.5 - camera.position.y) * 0.05;
        camera.lookAt(0, 2, 0);

        pyramidGroup.rotation.y += 0.002;
        
        // Yüzlerin hafif parlaması
        faces.forEach((f, i) => {
            f.material.opacity = 0.2 + Math.sin(Date.now() * 0.001 + i) * 0.2;
        });

        // Sayaç güncelleme
        if(Math.random() > 0.95) {
            countVal += 1;
            document.getElementById('number').innerText = countVal.toLocaleString('en-US');
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
