<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER: The Eternal Monument</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        body { margin: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); overflow: hidden; font-family: 'Orbitron', sans-serif; }
        
        /* UI Güzelleştirme */
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 40px 0; pointer-events: none; z-index: 10;
        }

        h1 { 
            font-size: clamp(2rem, 8vw, 4.5rem); font-weight: 900; color: #fff;
            letter-spacing: 15px; margin: 0; text-shadow: 0 0 30px rgba(255,215,0,0.5);
            background: linear-gradient(to bottom, #fff, #ffd700);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .cta-container { pointer-events: auto; margin-bottom: 50px; }
        
        button {
            background: rgba(0,0,0,0.8); color: #ffd700; border: 2px solid #ffd700;
            padding: 20px 50px; font-size: 1.2rem; font-family: 'Orbitron', sans-serif;
            cursor: pointer; transition: 0.5s; letter-spacing: 3px; border-radius: 0;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }

        button:hover {
            background: #ffd700; color: #000; box-shadow: 0 0 50px #ffd700;
            transform: translateY(-5px);
        }

        #stats { 
            position: absolute; bottom: 30px; left: 30px; color: rgba(255,215,0,0.6);
            font-size: 0.7rem; text-align: left; line-height: 2;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>AETHER</h1>
        <div class="cta-container">
            <button onclick="console.log('Initiating...')">CLAIM YOUR PIXEL</button>
        </div>
    </div>

    <div id="stats">
        ESTABLISHED: 2026<br>
        GLOBAL REACH: 8.0B<br>
        STATUS: ONLINE
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // YILDIZLAR (Sonsuz Uzay Hissi)
        const starGeo = new THREE.BufferGeometry();
        const starCount = 3000;
        const posArray = new Float32Array(starCount * 3);
        for(let i=0; i < starCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // PİRAMİT (Obsidyen / Cam Görünümü)
        const geometry = new THREE.ConeGeometry(5, 8, 4);
        const material = new THREE.MeshPhysicalMaterial({ 
            color: 0x050505, metalness: 0.9, roughness: 0.05,
            transmission: 0.5, thickness: 2, transparent: true
        });
        const pyramid = new THREE.Mesh(geometry, material);
        scene.add(pyramid);

        // ALTIN HALKA (Piramidin Etrafında Dönen Şerit)
        const ringGeo = new THREE.TorusGeometry(7, 0.03, 16, 100);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 2 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2.5;
        scene.add(ring);

        // IŞIKLAR
        const mainLight = new THREE.PointLight(0xffd700, 2, 50);
        mainLight.position.set(5, 5, 5);
        scene.add(mainLight);
        
        const blueLight = new THREE.PointLight(0x00ffff, 1, 50);
        blueLight.position.set(-5, -5, 2);
        scene.add(blueLight);

        camera.position.z = 15;

        // ANİMASYON
        function animate() {
            requestAnimationFrame(animate);
            pyramid.rotation.y += 0.003;
            ring.rotation.z -= 0.01;
            stars.rotation.y += 0.0005;
            
            // Nefes alma efekti (Işık hafifçe parlar söner)
            mainLight.intensity = 1.5 + Math.sin(Date.now() * 0.002) * 0.5;
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
