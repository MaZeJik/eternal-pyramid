<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eternal Pyramid | Adını Sonsuzluğa Kazı</title>
    <style>
        /* GENEL TASARIM */
        body { margin: 0; background-color: #000; color: #ffd700; font-family: 'Courier New', monospace; text-align: center; overflow: hidden; }
        
        /* ARAYÜZ (UI) */
        #ui { position: absolute; top: 5%; width: 100%; z-index: 10; pointer-events: none; }
        h1 { font-size: 2.5rem; letter-spacing: 5px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); margin-bottom: 5px; }
        p { color: #888; font-size: 1rem; }
        
        /* BUTON TASARIMI */
        button { 
            pointer-events: auto; 
            background: linear-gradient(45deg, #ffd700, #b8860b); 
            color: black; 
            padding: 18px 40px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 50px; 
            font-size: 1.2rem; 
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3); 
            transition: 0.3s;
            margin-top: 20px;
        }
        button:hover { transform: scale(1.1); box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
        
        /* İSTATİSTİK */
        #stats { position: absolute; bottom: 20px; left: 20px; color: #0f0; font-size: 0.8rem; text-shadow: 0 0 5px #0f0; text-align: left; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>THE ETERNAL PYRAMID</h1>
        <p>Sonsuzlukta bir yerin olsun. Ücret: 1 USD (SOL)</p>
        <button onclick="payWithSolana()">TUĞLA SATIN AL</button>
    </div>

    <div id="stats">
        CANLI DURUM:<br>
        BAĞIŞ: $1,876,420<br>
        TOPLAM TUĞLA: 1,420,901
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 3D SAHNE KURULUMU ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- IŞIKLANDIRMA (Siyah taşların parlaması için) ---
        const light = new THREE.PointLight(0xffffff, 1.2, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);

        // --- PİRAMİT GÖVDESİ (Siyah Parlak Taşlar) ---
        const geometry = new THREE.ConeGeometry(5, 8, 4);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            roughness: 0.15, 
            metalness: 0.7,
            flatShading: true 
        });
        const pyramid = new THREE.Mesh(geometry, material);
        scene.add(pyramid);

        // Kenar Çizgileri (Lüks görünüm verir)
        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.2 }));
        pyramid.add(line);

        // --- ALTIN ZİRVE (CAPSTONE) ---
        const tipGeo = new THREE.ConeGeometry(1, 1.6, 4);
        const tipMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1, roughness: 0.1 });
        const tip = new THREE.Mesh(tipGeo, tipMat);
        tip.position.y = 4.8;
        pyramid.add(tip);

        camera.position.z = 12;

        // --- ANİMASYON DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);
            pyramid.rotation.y += 0.005; // Piramit yavaşça döner
            renderer.render(scene, camera);
        }
        animate();

        // --- PENCERE BOY
