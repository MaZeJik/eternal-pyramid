<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE MONOLITH | FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; cursor: crosshair; }
        
        #ui {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center; padding-bottom: 5vh;
            z-index: 100; pointer-events: none;
        }

        #counter {
            font-family: 'Cinzel', serif; font-size: clamp(4rem, 15vw, 10rem);
            color: #fff; margin: 0; letter-spacing: -8px;
            background: linear-gradient(180deg, #fff 40%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 80px rgba(212,175,55,0.6));
            opacity: 0.9;
        }

        /* Görüntüye analog bir derinlik katan kirlilik katmanı */
        .grain {
            position: fixed; inset: 0; z-index: 50; pointer-events: none;
            background: url('https://media.giphy.com/media/oEI9uWUic9Zsc/giphy.gif');
            opacity: 0.05; mix-blend-mode: overlay;
        }
    </style>
</head>
<body>

<div class="grain"></div>
<div id="ui">
    <h1 id="counter">8,000,000,000</h1>
    <div style="color:#d4af37; font-family:Cinzel; letter-spacing:20px; font-size:0.6rem; opacity:0.4; margin-bottom: 20px;">COLLECTIVE ASCENSION</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    // Perspektifi çok daraltarak objeyi devleştiriyoruz (Lens compression)
    const camera = new THREE.PerspectiveCamera(12, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.set(0, 5, 80);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.8;
    document.body.appendChild(renderer.domElement);

    const anchor = new THREE.Group();
    scene.add(anchor);

    // --- GERÇEK TAŞ DOKUSU VE RÖLYEFLER ---
    // Taşın o ham, kirli dokusunu yaratıyoruz
    const canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#111'; ctx.fillRect(0,0,1024,1024);
    for(let i=0; i<100000; i++) {
        ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.15})`;
        ctx.fillRect(Math.random()*1024, Math.random()*1024, 2, 2);
    }
    const stoneTex = new THREE.CanvasTexture(canvas);

    // --- THE MONOLITH (PİRAMİT) ---
    const pyramidGeo = new THREE.ConeGeometry(12, 18, 4);
    const pyramidMat = new THREE.MeshStandardMaterial({ 
        color: 0x0a0a0a, bumpMap: stoneTex, bumpScale: 1.5, roughness: 1, metalness: 0.1 
    });
    const monolith = new THREE.Mesh(pyramidGeo, pyramidMat);
    monolith.position.y = 2; // Sayının üzerinde yükselsin
    anchor.add(monolith);

    // --- KAZINMIŞ YÜZLER (RELIEFS) ---
    const loader = new THREE.TextureLoader();
    for(let i=0; i<120; i++) {
        const side = i % 4, row = Math.floor(i / 15);
        const angle = side * (Math.PI / 2);
        const radius = 11.1 - (row * 0.85);
        
        const faceTex = loader.load(`https://i.pravatar.cc/100?u=${i+100}`);
        const faceMat = new THREE.MeshStandardMaterial({ 
            map: faceTex, bumpMap: faceTex, bumpScale: -0.8,
            transparent: true, opacity: 0.5, color: 0x222, blending: THREE.MultiplyBlending 
        });
        const p = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.9), faceMat);
        p.position.set(Math.cos(angle)*radius, (row * 1.4) - 5, Math.sin(angle)*radius);
        p.rotation.y = angle;
        anchor.add(p);
    }

    // --- ZİRVEDEKİ IŞIK KAYNAĞI ---
    const topLight = new THREE.PointLight(0xd4af37, 20, 100);
    topLight.position.set(0, 15, 5);
    scene.add(topLight);

    // Fareyi takip eden, taşın pürüzlerini ortaya çıkaran meşale
    const torch = new THREE.PointLight(0xffffff, 2, 50);
    scene.add(torch);

    // --- HANTAL VE MAĞRUR HAREKET ---
    let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
    window.addEventListener('mousemove', (e) => {
        targetX = (e.clientX - window.innerWidth/2) * 0.0002;
        targetY = (e.clientY - window.innerHeight/2) * 0.0002;
        torch.position.set((e.clientX/window.innerWidth-0.5)*60, -(e.clientY/window.innerHeight-0.5)*60, 20);
    });

    function animate() {
        requestAnimationFrame(animate);
        currentX += (targetX - currentX) * 0.03; // Ağır ivme
        currentY += (targetY - currentY) * 0.03;
        anchor.rotation.y += 0.0015 + currentX;
        anchor.rotation.x = currentY;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
