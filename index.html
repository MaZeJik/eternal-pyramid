<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | THE MONUMENT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@100;400&display=swap');
        body { margin: 0; background: #050505; overflow: hidden; }
        
        #ui {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 60px 0; z-index: 10; pointer-events: none;
        }

        .header-box { text-align: center; }
        #number {
            font-family: 'Cinzel', serif; font-size: 5rem; color: #fff; margin: 0;
            text-shadow: 0 0 40px rgba(212,175,55,0.4);
        }
        .subtitle { color: #d4af37; letter-spacing: 15px; font-size: 0.9rem; text-transform: uppercase; }

        .btn-join {
            pointer-events: auto; background: rgba(0,0,0,0.8); color: #fff;
            border: 2px solid #d4af37; padding: 20px 80px; font-family: 'Cinzel';
            font-size: 1.2rem; cursor: pointer; transition: 0.3s;
        }
        .btn-join:hover { background: #d4af37; color: #000; box-shadow: 0 0 60px #d4af37; }
    </style>
</head>
<body>

<div id="ui">
    <div class="header-box">
        <h1 id="number">8,000,000,000</h1>
        <div class="subtitle">E T E R N A L &nbsp; N E X U S</div>
    </div>
    <button class="btn-join" onclick="alert('Integration sequence initiated.')">JOIN THE MONUMENT</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- GERÇEKÇİ PİRAMİT ---
    const pyramidGroup = new THREE.Group();
    scene.add(pyramidGroup);

    // 1. Üst Kısım: Kumtaşı Dokusu
    const stoneMat = new THREE.MeshStandardMaterial({ color: 0xc2b280, roughness: 1, metalness: 0 });
    const pyramid = new THREE.Mesh(new THREE.ConeGeometry(8, 12, 4), stoneMat);
    pyramidGroup.add(pyramid);

    // 2. Altın Capstone (Soru İşareti)
    const qLabel = createQ();
    qLabel.position.y = 6.5;
    pyramidGroup.add(qLabel);

    function createQ() {
        const c = document.createElement('canvas'); c.width=512; c.height=512;
        const x = c.getContext('2d');
        x.font = "bold 350px 'Cinzel'"; x.fillStyle="#d4af37"; x.textAlign="center"; x.textBaseline="middle";
        x.shadowColor="#d4af37"; x.shadowBlur=50; x.fillText("?", 256, 256);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c) }));
        sprite.scale.set(4, 4, 1);
        return sprite;
    }

    // --- MOZAİK DOKUSU ---
    const texSize = 1024;
    const canvas = document.createElement('canvas');
    canvas.width = texSize; canvas.height = texSize;
    const ctx = canvas.getContext('2d');
    const faceTex = new THREE.CanvasTexture(canvas);
    
    // Alt kısımları yüzlerle kaplı bir malzeme daha ekleyelim
    const faceOverlay = new THREE.Mesh(
        new THREE.ConeGeometry(8.05, 12.05, 4),
        new THREE.MeshBasicMaterial({ map: faceTex, transparent: true, opacity: 0.9 })
    );
    pyramidGroup.add(faceOverlay);

    const faceImages = [];
    for(let i=0; i<40; i++) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = `https://i.pravatar.cc/150?u=${Math.random()}`;
        faceImages.push(img);
    }

    function updateMosaic() {
        ctx.clearRect(0, 0, texSize, texSize);
        const rows = 10; const cols = 20;
        const w = texSize / cols; const h = (texSize / 3) / rows;
        const startY = texSize - (rows * h);

        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                const img = faceImages[Math.floor(Math.random()*faceImages.length)];
                if(img.complete) {
                    ctx.filter = 'grayscale(100%) brightness(0.7) sepia(20%)';
                    ctx.drawImage(img, c*w, startY + (r*h), w-2, h-2);
                }
                ctx.strokeStyle = "rgba(212,175,55,0.4)";
                ctx.strokeRect(c*w, startY + (r*h), w, h);
            }
        }
        faceTex.needsUpdate = true;
    }

    // IŞIK
    const light = new THREE.PointLight(0xffffff, 1.5, 50);
    light.position.set(10, 10, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x222222));

    // ARKA PLAN
    const stars = new THREE.Points(
        new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(3000*3).map(()=>(Math.random()-0.5)*150), 3)),
        new THREE.PointsMaterial({ size: 0.05, color: 0xffffff })
    );
    scene.add(stars);

    // MOUSE
    let mX = 0;
    window.addEventListener('mousemove', (e) => mX = (e.clientX / window.innerWidth - 0.5) * 0.01);

    function animate() {
        requestAnimationFrame(animate);
        pyramidGroup.rotation.y += 0.003 + mX;
        qLabel.position.y = 6.5 + Math.sin(Date.now()*0.002)*0.1;
        if(Math.random() > 0.98) updateMosaic();
        renderer.render(scene, camera);
    }

    setTimeout(updateMosaic, 1500);
    animate();
</script>
</body>
</html>
