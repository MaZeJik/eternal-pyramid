<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE ETERNAL NEXUS | APEX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@100;300;600&display=swap');
        
        body { margin: 0; background: #000; overflow: hidden; cursor: crosshair; }
        
        /* Otorite Katmanı */
        #ui {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 5vh 0; z-index: 100; pointer-events: none;
        }

        .main-header { text-align: center; transform: translateY(-20px); }
        
        #counter {
            font-family: 'Cinzel', serif; font-size: clamp(4rem, 12vw, 10rem);
            color: #fff; margin: 0; letter-spacing: -4px; line-height: 0.8;
            background: linear-gradient(180deg, #fff 30%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 60px rgba(212,175,55,0.4));
        }

        .label { 
            color: #d4af37; letter-spacing: 25px; font-size: 0.7rem; 
            text-transform: uppercase; font-weight: 600; margin-top: 25px;
            opacity: 0.8; text-indent: 25px;
        }

        .btn-ascend {
            pointer-events: auto; background: rgba(255,255,255,0.03);
            color: #fff; border: 1px solid rgba(212,175,55,0.5);
            padding: 25px 120px; font-family: 'Cinzel'; font-size: 1.3rem;
            letter-spacing: 12px; cursor: pointer; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(20px);
        }
        .btn-ascend:hover { 
            background: #d4af37; color: #000; box-shadow: 0 0 120px #d4af37;
            letter-spacing: 18px; transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="main-header">
        <h1 id="counter">8,000,000,000</h1>
        <div class="label">Humanity Legacy Index</div>
    </div>
    <button class="btn-ascend">ETERNALIZE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(28, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 28);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    // --- MONOLİT (Pürüzsüz Siyah Mermer & Altın) ---
    const pyramidGroup = new THREE.Group();
    scene.add(pyramidGroup);

    // Piramit Gövdesi
    const pyramidGeo = new THREE.ConeGeometry(8, 12, 4);
    const pyramidMat = new THREE.MeshStandardMaterial({ 
        color: 0x020202, metalness: 1, roughness: 0.05
    });
    const pyramid = new THREE.Mesh(pyramidGeo, pyramidMat);
    pyramidGroup.add(pyramid);

    // Altın Çizgiler (Edge Glow)
    const edges = new THREE.EdgesGeometry(pyramidGeo);
    const lineMat = new THREE.LineBasicMaterial({ color: 0xd4af37, transparent: true, opacity: 0.3 });
    const line = new THREE.LineSegments(edges, lineMat);
    pyramidGroup.add(line);

    // --- ZİRVE (Yüce Soru İşareti) ---
    const qSprite = createQ();
    qSprite.position.y = 7.2;
    pyramidGroup.add(qSprite);

    function createQ() {
        const can = document.createElement('canvas'); can.width=1024; can.height=1024;
        const x = can.getContext('2d');
        x.font = "bold 550px 'Cinzel'"; x.fillStyle="#fff"; x.textAlign="center"; x.textBaseline="middle";
        x.shadowColor="#d4af37"; x.shadowBlur=80; x.fillText("?", 512, 512);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(can) }));
        sprite.scale.set(6, 6, 1);
        return sprite;
    }

    // --- İNSAN MOZAİĞİ (Gömülü Ekranlar) ---
    const faces = [];
    const faceCount = 100;
    const faceGroup = new THREE.Group();
    pyramidGroup.add(faceGroup);

    for(let i=0; i<faceCount; i++) {
        const tex = new THREE.TextureLoader().load(`https://i.pravatar.cc/150?u=${i + Math.random()}`);
        const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.4 });
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.7), mat);
        
        const side = i % 4;
        const row = Math.floor(i / 10);
        const angle = side * (Math.PI / 2);
        const radius = 6.2 - (row * 0.4);
        
        plane.position.set(Math.cos(angle)*radius, (row * 0.9) - 5, Math.sin(angle)*radius);
        plane.rotation.y = angle;
        faceGroup.add(plane);
        faces.push({ mesh: plane, speed: 0.01 + Math.random() * 0.02 });
    }

    // --- IŞIKLANDIRMA (Yüksek Kalite) ---
    const goldLight = new THREE.PointLight(0xd4af37, 8, 40);
    goldLight.position.set(0, 12, 5);
    scene.add(goldLight);

    const ambient = new THREE.AmbientLight(0xffffff, 0.1);
    scene.add(ambient);

    // --- ETKİLEŞİM VE ANİMASYON ---
    let targetX = 0, targetY = 0;
    window.addEventListener('mousemove', (e) => {
        targetX = (e.clientX - window.innerWidth/2) * 0.0004;
        targetY = (e.clientY - window.innerHeight/2) * 0.0004;
    });

    let countVal = 8000000000;
    function animate() {
        requestAnimationFrame(animate);
        
        pyramidGroup.rotation.y += 0.003 + targetX;
        pyramidGroup.rotation.x += (targetY - pyramidGroup.rotation.x) * 0.05;

        // Yüzlerin yanıp sönmesi (Veri akışı hissi)
        faces.forEach(f => {
            f.mesh.material.opacity = 0.2 + Math.abs(Math.sin(Date.now() * 0.001 * f.speed * 50)) * 0.3;
        });

        qSprite.position.y = 7.2 + Math.sin(Date.now()*0.0015)*0.2;

        if(Math.random() > 0.97) {
            countVal += 1;
            document.getElementById('counter').innerText = countVal.toLocaleString('en-US');
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
