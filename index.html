<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE ETERNAL NEXUS | SOVEREIGN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@100;300&display=swap');
        body { margin: 0; background: #000; overflow: hidden; }
        
        #ui {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 40px; z-index: 100; pointer-events: none;
        }

        #counter-container { text-align: center; }
        #number {
            font-family: 'Cinzel', serif; font-size: 8vw; color: #fff; margin: 0;
            background: linear-gradient(to bottom, #fff 0%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(212,175,55,0.5));
            line-height: 0.9;
        }

        .btn-ascend {
            pointer-events: auto; background: none; border: 1px solid #d4af37;
            color: #d4af37; padding: 25px 100px; font-family: 'Cinzel';
            font-size: 1.2rem; letter-spacing: 15px; cursor: pointer;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .btn-ascend:hover { background: #d4af37; color: #000; box-shadow: 0 0 100px #d4af37; letter-spacing: 20px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="counter-container">
        <h1 id="number">8,000,000,000</h1>
        <div style="color:#d4af37; letter-spacing:20px; font-size:0.8rem; margin-top:10px;">HUMANITY COLLECTIVE</div>
    </div>
    <button class="btn-ascend">ASCEND</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 22);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- MONOLİT: SİYAH MERMER VE ALTIN ---
    const pyramidGroup = new THREE.Group();
    scene.add(pyramidGroup);

    const pyramidGeo = new THREE.ConeGeometry(7, 10, 4);
    const pyramidMat = new THREE.MeshStandardMaterial({ 
        color: 0x050505, // Siyah Mermer
        metalness: 1.0,
        roughness: 0.1,
        emissive: 0xd4af37,
        emissiveIntensity: 0.05
    });
    const mainPyramid = new THREE.Mesh(pyramidGeo, pyramidMat);
    pyramidGroup.add(mainPyramid);

    // Altın Kenar Parlaması
    const wireframe = new THREE.Mesh(
        pyramidGeo,
        new THREE.MeshBasicMaterial({ color: 0xd4af37, wireframe: true, transparent: true, opacity: 0.2 })
    );
    pyramidGroup.add(wireframe);

    // --- ZİRVE: KUTSAL IŞIK ---
    const qLabel = createText("?");
    qLabel.position.y = 6;
    pyramidGroup.add(qLabel);

    function createText(text) {
        const c = document.createElement('canvas'); c.width=512; c.height=512;
        const x = c.getContext('2d');
        x.font = "bold 400px 'Cinzel'"; x.fillStyle="#fff"; x.textAlign="center"; x.textBaseline="middle";
        x.shadowColor="#d4af37"; x.shadowBlur=50; x.fillText(text, 256, 256);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c) }));
        sprite.scale.set(4, 4, 1);
        return sprite;
    }

    // --- İNSAN YÜZLERİ (SİSTEMATİK MOZAİK) ---
    const faceCount = 100;
    const swarm = [];
    for(let i=0; i<faceCount; i++) {
        const tex = new THREE.TextureLoader().load(`https://i.pravatar.cc/150?u=${i + Math.random()}`);
        const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.6 });
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.6), mat);
        
        const angle = (i / faceCount) * Math.PI * 2;
        const radius = 8.5 + (Math.random() * 2);
        plane.position.set(Math.cos(angle)*radius, (Math.random()*10)-5, Math.sin(angle)*radius);
        
        scene.add(plane);
        swarm.push({ mesh: plane, angle: angle
