<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE NEXUS MONUMENT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@100;300&display=swap');
        body { margin: 0; background: #000; overflow: hidden; }
        
        /* UI: Ultra Minimalist & Luxury */
        #ui {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 60px 0; z-index: 10; pointer-events: none;
        }

        #number {
            font-family: 'Cinzel', serif; font-size: 5.5rem; color: #fff; margin: 0;
            background: linear-gradient(180deg, #fff 0%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(212,175,55,0.3));
        }

        .btn-nexus {
            pointer-events: auto; background: none; border: 1px solid #d4af37;
            color: #d4af37; padding: 25px 80px; font-family: 'Cinzel';
            font-size: 1.2rem; letter-spacing: 10px; cursor: pointer;
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-nexus:hover { background: #d4af37; color: #000; letter-spacing: 15px; box-shadow: 0 0 100px #d4af37; }
    </style>
</head>
<body>

<div id="ui">
    <h1 id="number">8,000,000,000</h1>
    <button class="btn-nexus" onclick="console.log('Ascending...')">ASCEND</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true, stencil: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true; // Gölge desteği!
    document.body.appendChild(renderer.domElement);

    // --- GERÇEKÇİ TAŞ DOKUSU VE PİRAMİT ---
    const pyramidGroup = new THREE.Group();
    scene.add(pyramidGroup);

    // Özel Shader benzeri materyal (Gerçekçi Taş Hissi)
    const stoneMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x3d2b1f, 
        roughness: 0.9, 
        metalness: 0.1,
        flatShading: true // Taş blokları daha net görünür
    });

    const pyramid = new THREE.Mesh(new THREE.ConeGeometry(8, 11, 4), stoneMaterial);
    pyramid.castShadow = true;
    pyramid.receiveShadow = true;
    pyramidGroup.add(pyramid);

    // --- ALTIN ZİRVE (YÜKSEK ÇÖZÜNÜRLÜK) ---
    const qLabel = createHighResQ();
    qLabel.position.y = 6.8;
    pyramidGroup.add(qLabel);

    function createHighResQ() {
        const c = document.createElement('canvas'); c.width=1024; c.height=1024;
        const x = c.getContext('2d');
        x.font = "bold 600px 'Cinzel'"; x.fillStyle="#fff"; x.textAlign="center"; x.textBaseline="middle";
        x.shadowColor="#d4af37"; x.shadowBlur=60; x.fillText("?", 512, 512);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true }));
        sprite.scale.set(5, 5, 1);
        return sprite;
    }

    // --- DİNAMİK YÜZ SİSTEMİ (STABİL) ---
    const faceCount = 100; // Daha fazla yüz, daha fazla heybet
    const faces = [];
    for(let i=0; i<faceCount; i++) {
        const tex = new THREE.TextureLoader().load(`https://i.pravatar.cc/150?u=${i}`);
        const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.6 });
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.7), mat);
        
        const angle = (i / faceCount) * Math.PI * 2;
        const radius = 9 + Math.random() * 2;
        mesh.position.set(Math.cos(angle)*radius, (Math.random()*6)-3, Math.sin(angle)*radius);
        scene.add(mesh);
        faces.push({ mesh, angle, speed: 0.001 + Math.random()*0.003 });
    }

    // --- SİNEMATİK IŞIKLANDIRMA ---
    const spotLight = new THREE.SpotLight(0xd4af37, 2.5);
    spotLight.position.set(0, 15, 10);
    spotLight.castShadow = true;
    scene.add(spotLight);
    scene.add(new THREE.AmbientLight(0x222222));

    // MOUSE ETKİLEŞİMİ (Hatasız)
    let targetX = 0, targetY = 0;
    window.addEventListener('mousemove', (e) => {
        targetX = (e.clientX - window.innerWidth/2) * 0.0002;
        targetY = (e.clientY - window.innerHeight/2) * 0.0002;
    });

    let countVal = 8000000000;
    function animate() {
        requestAnimationFrame(animate);
        
        pyramidGroup.rotation.y += 0.002 + targetX;
        pyramidGroup.rotation.x += targetY;

        // Yüzlerin süzülüşü (Billboard efekti)
        faces.forEach(f => {
            f.angle += f.speed;
            f.mesh.position.x = Math.cos(f.angle) * 10;
            f.mesh.position.z = Math.sin(f.angle) * 10;
            f.mesh.lookAt(camera.position);
        });

        qLabel.position.y = 6.8 + Math.sin(Date.now()*0.001)*0.2;
        
        if(Math.random() > 0.9) {
            countVal += 1;
            document.getElementById('number').innerText = countVal.toLocaleString('en-US');
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
