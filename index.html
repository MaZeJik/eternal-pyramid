<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE SOURCE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; cursor: crosshair; }
        
        #zenith-ui {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 8vh; z-index: 100; pointer-events: none;
        }

        #master-counter {
            font-family: 'Cinzel', serif; font-size: 12vw; color: #fff;
            background: linear-gradient(180deg, #ffffff 30%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 120px rgba(212,175,55,0.8));
            letter-spacing: -10px; line-height: 0.7; margin: 0;
        }

        .void-text { 
            color: #d4af37; letter-spacing: 40px; font-size: 0.5rem; 
            text-transform: uppercase; opacity: 0.2; font-family: 'Cinzel';
        }
    </style>
</head>
<body>

<div id="zenith-ui">
    <div style="text-align: center;">
        <h1 id="master-counter">8,000,000,000</h1>
        <div class="void-text">Core Consciousness</div>
    </div>
    <div class="void-text">ORIGIN POINT</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(8, window.innerWidth / window.innerHeight, 1, 3000);
    camera.position.z = 120;

    const renderer = new THREE.WebGLRenderer({ antialias: true, stencil: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 3.0;
    document.body.appendChild(renderer.domElement);

    const anchor = new THREE.Group();
    scene.add(anchor);

    // --- THE DARK MONOLITH (Matematiksel Kusursuzluk) ---
    const pyramidGeo = new THREE.ConeGeometry(10, 16, 4, 1, true);
    const pyramidMat = new THREE.MeshStandardMaterial({ 
        color: 0x000000, 
        roughness: 1, 
        metalness: 0,
        flatShading: false
    });
    const monolith = new THREE.Mesh(pyramidGeo, pyramidMat);
    anchor.add(monolith);

    // ALTIN ÇATLAKLAR (İçerideki Volkan)
    const wireGeo = new THREE.ConeGeometry(10.05, 16.05, 4, 1, true);
    const wireMat = new THREE.MeshBasicMaterial({ color: 0xd4af37, wireframe: true, transparent: true, opacity: 0.05 });
    anchor.add(new THREE.Mesh(wireGeo, wireMat));

    // --- RÖLYEF SİSTEMİ (Taşın Hafızası) ---
    const faces = [];
    for(let i=0; i<200; i++) {
        const side = i % 4;
        const row = Math.floor(i / 20);
        const angle = side * (Math.PI / 2);
        const radius = 9.5 - (row * 0.6);
        
        const tex = new THREE.TextureLoader().load(`https://i.pravatar.cc/100?u=${i + 500}`);
        const mat = new THREE.MeshStandardMaterial({ 
            map: tex, 
            transparent: true, 
            opacity: 0, // Başta gizli
            emissive: 0xd4af37, 
            emissiveIntensity: 0,
            blending: THREE.AdditiveBlending
        });
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.7), mat);
        plane.position.set(Math.cos(angle)*radius, (row * 1.3) - 7, Math.sin(angle)*radius);
        plane.rotation.y = angle;
        anchor.add(plane);
        faces.push({ m: plane, ph: Math.random() * Math.PI * 2 });
    }

    // --- IŞIK (Yıkıcı Güç) ---
    const pointLight = new THREE.PointLight(0xd4af37, 40, 200);
    pointLight.position.set(0, 5, 30);
    scene.add(pointLight);

    // --- ATALET VE KAOS ---
    let targetX = 0, targetY = 0;
    let curX = 0, curY = 0;
    window.addEventListener('mousemove', (e) => {
        targetX = (e.clientX - window.innerWidth/2) * 0.0002;
        targetY = (e.clientY - window.innerHeight/2) * 0.0002;
    });

    function render() {
        requestAnimationFrame(render);
        
        // Tonlarca ağırlık hissi (Çok düşük Lerp)
        curX += (targetX - curX) * 0.005;
        curY += (targetY - curY) * 0.005;
        
        anchor.rotation.y += 0.001 + curX;
        anchor.rotation.x += curY;

        const time = Date.now() * 0.001;
        
        // Yüzlerin "Anlık Belirişi" (Subliminal Efekt)
        faces.forEach(f => {
            const intensity = Math.pow(Math.sin(time + f.ph), 10); // Sadece anlık parlamalar
            f.m.material.opacity = intensity * 0.4;
            f.m.material.emissiveIntensity = intensity * 2;
        });

        renderer.render(scene, camera);
    }
    render();
</script>
</body>
</html>
