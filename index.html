<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ETERNAL NEXUS | GEMINI EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Montserrat:wght@100;300;600&display=swap');
        
        body { margin: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); overflow: hidden; cursor: crosshair; }
        
        /* Cinematic UI */
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 50px 0; z-index: 100; pointer-events: none;
        }

        .main-display {
            text-align: center; border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px 80px; backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.5); box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        #counter {
            font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900; color: #fff; margin: 0; line-height: 1;
            background: linear-gradient(to bottom, #fff 20%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(212,175,55,0.4));
        }

        .tagline { color: #d4af37; letter-spacing: 12px; font-size: 0.8rem; margin-top: 15px; text-transform: uppercase; font-weight: 300; }

        .btn-ascend {
            pointer-events: auto; background: none; border: 1px solid #d4af37;
            color: #d4af37; padding: 20px 60px; font-family: 'Cinzel';
            font-size: 1.1rem; letter-spacing: 6px; cursor: pointer;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .btn-ascend:hover { background: #d4af37; color: #000; box-shadow: 0 0 80px #d4af37; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="main-display">
        <h1 id="counter">7,984,102,540</h1>
        <div class="tagline">The Collective Soul Index</div>
    </div>
    <button class="btn-ascend" onclick="initiateAscension()">ASCEND TO ETERNITY</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.02);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 4, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- COSMOS DESIGN ---
    const starGeo = new THREE.BufferGeometry();
    const starCount = 10000;
    const starPos = new Float32Array(starCount * 3);
    for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random()-0.5)*250;
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.1, color: 0xd4af37, transparent: true, opacity: 0.6 }));
    scene.add(stars);

    // --- THE PYRAMID (ANCIENT STONE MEETS DIGITAL) ---
    const pyramidGroup = new THREE.Group();
    scene.add(pyramidGroup);

    // Gerçekçi doku için özel malzeme
    const stoneMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x4a3728, roughness: 0.9, metalness: 0.2, flatShading: false
    });
    const pyramid = new THREE.Mesh(new THREE.ConeGeometry(8, 11, 4), stoneMaterial);
    pyramidGroup.add(pyramid);

    // --- GOLDEN CAPSTONE (The Soru İşareti) ---
    const qLabel = createTextLabel("?");
    qLabel.position.y = 7;
    pyramidGroup.add(qLabel);

    function createTextLabel(text) {
        const can = document.createElement('canvas'); can.width=512; can.height=512;
        const cx = can.getContext('2d');
        cx.font = "bold 400px 'Cinzel'"; cx.fillStyle = "#fff";
        cx.textAlign = "center"; cx.textBaseline = "middle";
        cx.shadowColor = "#d4af37"; cx.shadowBlur = 40;
        cx.fillText(text, 256, 256);
        const tex = new THREE.CanvasTexture(can);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
        sprite.scale.set(4.5, 4.5, 1);
        return sprite;
    }

    // --- THE HUMAN SWARM (Yaşayan Yüzler) ---
    const faceCount = 80;
    const swarm = [];
    for(let i=0; i<faceCount; i++) {
        const faceCanvas = document.createElement('canvas'); faceCanvas.width=128; faceCanvas.height=128;
        const faceCtx = faceCanvas.getContext('2d');
        const faceTex = new THREE.CanvasTexture(faceCanvas);
        const faceMat = new THREE.MeshBasicMaterial({ map: faceTex, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), faceMat);
        
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = `https://i.pravatar.cc/100?u=${i + Math.random()}`;
        img.onload = () => {
            faceCtx.filter = 'grayscale(100%) contrast(1.2) brightness(0.8)';
            faceCtx.drawImage(img, 0, 0, 128, 128);
            faceTex.needsUpdate = true;
        };

        // Başlangıç pozisyonu (Piramit etrafında spiral)
        const radius = 9 + Math.random() * 3;
        const angle = Math.random() * Math.PI * 2;
        plane.position.set(Math.cos(angle)*radius, (Math.random()*8)-4, Math.sin(angle)*radius);
        
        scene.add(plane);
        swarm.push({ mesh: plane, angle: angle, radius: radius, speed: 0.001 + Math.random()*0.003, offset: Math.random()*100 });
    }

    // --- LIGHTING ---
    const pLight = new THREE.PointLight(0xd4af37, 3, 60);
    pLight.position.set(0, 10, 5);
    scene.add(pLight);
    scene.add(new THREE.AmbientLight(0x111111));

    // --- CONTROLS & ANIMATION ---
    let mouseX = 0, mouseY = 0;
    window.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX - window.innerWidth/2) * 0.0003;
        mouseY = (e.clientY - window.innerHeight/2) * 0.0003;
    });

    let countVal = 7984102540;
    function animate() {
        requestAnimationFrame(animate);
        
        pyramidGroup.rotation.y += 0.003 + mouseX;
        pyramidGroup.rotation.x += mouseY;

        // Swarm Animation (Yüzlerin akışı)
        swarm.forEach(f => {
            f.angle += f.speed;
            f.mesh.position.x = Math.cos(f.angle) * f.radius;
            f.mesh.position.z = Math.sin(f.angle) * f.radius;
            f.mesh.position.y += Math.sin(Date.now()*0.001 + f.offset)*0.005;
            f.mesh.lookAt(camera.position); // Yüzler her zaman sana bakar
        });

        stars.rotation.y += 0.0001;
        qLabel.position.y = 7 + Math.sin(Date.now()*0.0015)*0.25;

        // Canlı sayaç
        if(Math.random() > 0.8) {
            countVal += 1;
            document.getElementById('counter').innerText = countVal.toLocaleString('en-US');
        }

        renderer.render(scene, camera);
    }
    animate();

    function initiateAscension() {
        alert("Preparing your digital DNA for eternity...");
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
